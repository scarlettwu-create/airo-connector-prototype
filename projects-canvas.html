<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Projects · Workspace Canvas</title>
<style>
  /* ── Fluid design-system tokens (subset, from references/fluid-tokens.css) ── */
  :root {
    --primary-font-family: "Source Sans 3", "Source Sans Pro", Helvetica, Arial, sans-serif;

    --surface-default: #ffffff;
    --surface-subtle: #f6f9fb;
    --surface-alt: #e5eaf1;

    --text-primary: #373d47;
    --text-secondary: #586373;
    --text-emphasis: #1a1d21;
    --text-inverse: #ffffff;

    --border-default: #d5dbe4;
    --border-subtle: #e5eaf1;

    --radius-s: 4px;
    --radius-m: 8px;
    --radius-l: 12px;

    --shadow-card: 0 1px 2px rgba(26,29,33,.06), 0 1px 3px rgba(26,29,33,.10);
    --shadow-pop: 0 8px 24px rgba(26,29,33,.16), 0 2px 6px rgba(26,29,33,.08);

    /* palette */
    --blue-default:#1f75d7; --blue-emphasis:#0d4e9e; --blue-tint:#e7f2fa; --blue-subtle:#c8e2f8;
    --teal-default:#108291; --teal-emphasis:#065f69; --teal-tint:#eef8fa; --teal-subtle:#c7eded;
    --purple-default:#6d53c0; --purple-emphasis:#533aa2; --purple-tint:#ece9fa; --purple-subtle:#d9d3f5;
    --orange-default:#e67009; --orange-emphasis:#bd5200; --orange-tint:#faf0e3; --orange-subtle:#ffe2c1;
    --green-default:#5aa028; --green-emphasis:#44791e; --green-tint:#f0fae7; --green-subtle:#e0f5cf;
    --red-default:#da3b1c; --red-emphasis:#b6270a; --red-tint:#fff1f0; --red-subtle:#fcded9;
    --gray-default:#586373; --gray-tint:#f1f4f8; --gray-subtle:#e5eaf1;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--primary-font-family);
    color: var(--text-primary);
    background: var(--surface-subtle);
    overflow: hidden;
  }

  /* ── Top bar ── */
  .topbar {
    height: 56px; display: flex; align-items: center; gap: 16px;
    padding: 0 20px; background: var(--surface-default);
    border-bottom: 1px solid var(--border-subtle);
    position: relative; z-index: 20;
  }
  .brand { display: flex; align-items: center; gap: 9px; }
  .brand .mark {
    width: 26px; height: 26px; border-radius: 7px;
    background: linear-gradient(135deg, var(--purple-default), var(--blue-default));
    display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 14px;
  }
  .brand .name { font-weight: 700; font-size: 15px; color: var(--text-emphasis); }
  .crumb { color: var(--text-secondary); font-size: 13px; }
  .crumb b { color: var(--text-primary); font-weight: 600; }

  .topbar .spacer { flex: 1; }
  .search {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface-subtle); border: 1px solid var(--border-default);
    border-radius: var(--radius-m); padding: 7px 11px; width: 280px;
  }
  .search input { border: 0; background: transparent; outline: none; width: 100%;
    font: inherit; font-size: 13px; color: var(--text-primary); }
  .search svg { flex: none; opacity: .55; }

  .btn {
    font: inherit; font-size: 13px; font-weight: 600;
    border: 1px solid var(--border-default); background: var(--surface-default);
    color: var(--text-primary); border-radius: var(--radius-m);
    padding: 8px 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 7px;
    transition: background .12s, border-color .12s;
  }
  .btn:hover { background: var(--surface-subtle); }
  .btn.primary { background: var(--purple-default); border-color: var(--purple-default); color: #fff; }
  .btn.primary:hover { background: var(--purple-emphasis); }

  /* ── Tabs ── */
  .tabs {
    display: flex; align-items: center; gap: 26px; padding: 0 22px;
    background: var(--surface-default); border-bottom: 1px solid var(--border-subtle);
    position: relative; z-index: 19; height: 50px;
  }
  .tab {
    font: inherit; font-size: 14px; font-weight: 700; color: var(--text-secondary);
    background: transparent; border: 0; cursor: pointer; padding: 0 2px; height: 100%;
    border-bottom: 3px solid transparent; display: inline-flex; align-items: center; gap: 7px;
  }
  .tab:hover { color: var(--text-primary); }
  .tab.active { color: var(--text-emphasis); border-bottom-color: var(--text-emphasis); }
  .tab .badge-n { font-size: 11px; font-weight: 700; color: var(--text-secondary);
    background: var(--surface-alt); border-radius: 99px; padding: 1px 8px; }

  /* ── Templates view ── */
  #templatesView { position: absolute; left: 0; right: 0; top: 106px; bottom: 0; overflow-y: auto;
    padding: 26px 28px 60px; display: none; }
  #templatesView.show { display: block; }
  .tpl-intro { max-width: 720px; margin: 0 0 22px; }
  .tpl-intro h2 { font-size: 19px; font-weight: 800; color: var(--text-emphasis); margin: 0 0 5px; }
  .tpl-intro p { font-size: 13.5px; color: var(--text-secondary); line-height: 1.5; margin: 0; }
  .tpl-group { margin-bottom: 26px; }
  .tpl-group-head { display: flex; align-items: center; gap: 9px; font-size: 13px; font-weight: 800;
    margin: 0 0 12px; }
  .tpl-group-head .dot { width: 9px; height: 9px; border-radius: 99px; }
  .tpl-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .tpl-grid .tpl { background: var(--surface-default); border-style: solid; box-shadow: var(--shadow-card); }
  .tpl-grid .tpl:hover { box-shadow: var(--shadow-pop); }

  /* ── Canvas ── */
  .canvas-wrap { position: absolute; inset: 0; top: 0; overflow: hidden; }
  .stage-pad { position: absolute; top: 106px; left: 0; right: 0; bottom: 0; overflow: hidden; }
  .stage {
    position: absolute; top: 0; left: 0; transform-origin: 0 0;
    background-image: radial-gradient(var(--border-subtle) 1.1px, transparent 1.1px);
    background-size: 22px 22px;
    padding: 28px 28px 60px; display: flex; gap: 22px; cursor: grab;
    min-width: max-content;
  }
  .stage.grabbing { cursor: grabbing; }

  /* ── Lane (function) ── */
  .lane { width: 320px; flex: none; display: flex; flex-direction: column; }
  .lane-head {
    border-radius: var(--radius-m) var(--radius-m) 0 0; padding: 10px 14px;
    display: flex; align-items: center; gap: 9px; font-weight: 700; font-size: 13.5px;
    border: 1px solid; border-bottom: 0;
  }
  .lane-head .count {
    margin-left: auto; font-size: 12px; font-weight: 700;
    background: rgba(255,255,255,.65); border-radius: 99px; padding: 1px 9px;
  }
  .lane-head .dot { width: 9px; height: 9px; border-radius: 99px; }
  .lane-body {
    border: 1px solid; border-top: 0; border-radius: 0 0 var(--radius-m) var(--radius-m);
    padding: 12px; display: flex; flex-direction: column; gap: 11px; flex: 1; min-height: 540px;
  }

  /* ── Project card ── */
  .card {
    background: var(--surface-default); border: 1px solid var(--border-default);
    border-radius: var(--radius-m); padding: 13px 14px; cursor: pointer;
    box-shadow: var(--shadow-card); transition: transform .1s, box-shadow .12s, border-color .12s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-pop); border-color: var(--border-default); }
  .card .ct { display: flex; align-items: flex-start; gap: 8px; }
  .card .title { font-weight: 700; font-size: 14px; color: var(--text-emphasis); line-height: 1.25; flex: 1; }
  .pill { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 99px; white-space: nowrap; }
  .pill.live { background: var(--green-tint); color: var(--green-emphasis); }
  .pill.draft { background: var(--gray-tint); color: var(--gray-default); }
  .pill.attn { background: var(--red-tint); color: var(--red-emphasis); }
  .card .chips { display: flex; flex-wrap: wrap; gap: 5px; margin: 9px 0 10px; }
  .chip {
    font-size: 11px; font-weight: 600; color: var(--text-secondary);
    background: var(--surface-subtle); border: 1px solid var(--border-subtle);
    border-radius: var(--radius-s); padding: 2px 7px; display: inline-flex; gap: 4px; align-items: center;
  }
  .card .foot { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
  .card .foot .run { font-weight: 700; color: var(--text-primary); }
  .card .foot .sep { opacity: .4; }

  /* mini-map preview (Prezi thumbnail) */
  .mini { position: relative; width: 100%; margin: 11px 0 10px; border: 1px solid var(--border-subtle);
    border-radius: var(--radius-s); background: var(--surface-default); overflow: hidden;
    background-image: radial-gradient(var(--border-subtle) .6px, transparent .6px); background-size: 9px 9px; }
  .card:hover .mini { border-color: var(--border-default); }
  .mm-lane { position: absolute; left: 0; right: 0; border-top: 1px solid; border-bottom: 1px solid; opacity: .7; }
  .mm-node { position: absolute; border-radius: 2.5px; border-left: 2.5px solid; }
  .mm-node.s-live  { background:#dff0cf; border-color:var(--green-default); }
  .mm-node.s-draft { background:#e6eaf1; border-color:#9aa6b6; }
  .mm-node.s-attn  { background:#fbded7; border-color:var(--red-default); }

  /* build-progress bar */
  .prog { display: flex; align-items: center; gap: 9px; margin-bottom: 10px; }
  .prog .bar { flex: 1; height: 6px; border-radius: 99px; background: var(--surface-alt); overflow: hidden; }
  .prog .bar i { display: block; height: 100%; border-radius: 99px; background: var(--green-default); }
  .prog span { font-size: 11.5px; font-weight: 700; color: var(--text-secondary); white-space: nowrap; }

  /* ── Template / inspiration card ── */
  .tpl {
    border: 1.5px dashed var(--border-default); background: transparent;
    border-radius: var(--radius-m); padding: 12px 13px; cursor: pointer;
    transition: background .12s, border-color .12s;
  }
  .tpl:hover { background: var(--surface-default); border-color: var(--purple-muted, #b7a9ea); }
  .tpl .tl { font-size: 12.5px; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 7px; }
  .tpl .td { font-size: 12px; color: var(--text-secondary); margin-top: 4px; line-height: 1.35; }
  .tpl .badge { font-size: 10px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase;
    color: var(--purple-emphasis); background: var(--purple-tint); border-radius: var(--radius-s); padding: 1px 6px; }

  /* empty lane upsell */
  .empty {
    border: 1.5px dashed var(--border-default); border-radius: var(--radius-m);
    padding: 18px 14px; text-align: center; background: rgba(255,255,255,.4);
  }
  .empty .em-ic { font-size: 22px; margin-bottom: 6px; opacity: .8; }
  .empty .em-t { font-weight: 700; font-size: 13.5px; color: var(--text-emphasis); }
  .empty .em-d { font-size: 12.5px; color: var(--text-secondary); margin: 5px 0 12px; line-height: 1.4; }
  .lane-section-label { font-size: 10.5px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase;
    color: var(--text-secondary); margin: 4px 2px -2px; display: flex; align-items: center; gap: 6px; }
  .lane-section-label::after { content:""; flex:1; height:1px; background: var(--border-subtle); }

  /* ── Zoom control ── */
  .zoom {
    position: absolute; right: 20px; bottom: 20px; z-index: 18;
    display: flex; align-items: center; background: var(--surface-default);
    border: 1px solid var(--border-default); border-radius: var(--radius-m);
    box-shadow: var(--shadow-card); overflow: hidden;
  }
  .zoom button { border: 0; background: transparent; font: inherit; font-size: 16px; font-weight: 700;
    color: var(--text-secondary); width: 36px; height: 34px; cursor: pointer; }
  .zoom button:hover { background: var(--surface-subtle); }
  .zoom .lvl { width: 50px; text-align: center; font-size: 12px; font-weight: 700; color: var(--text-primary);
    border-left: 1px solid var(--border-subtle); border-right: 1px solid var(--border-subtle); line-height: 34px; }

  .hint { position: absolute; left: 20px; bottom: 22px; z-index: 18; font-size: 12px;
    color: var(--text-secondary); background: rgba(255,255,255,.8); border: 1px solid var(--border-subtle);
    border-radius: 99px; padding: 5px 12px; backdrop-filter: blur(4px); }

  /* ── Project canvas (inner page) ── */
  #canvasView { position: fixed; inset: 0; z-index: 40; background: var(--surface-subtle);
    display: none; flex-direction: column; }
  #canvasView.open { display: flex; }
  .cv-top { height: 58px; flex: none; display: flex; align-items: center; gap: 14px;
    padding: 0 18px; background: var(--surface-default); border-bottom: 1px solid var(--border-subtle); z-index: 5; }
  .cv-back { border: 1px solid var(--border-default); background: var(--surface-default); border-radius: var(--radius-m);
    width: 34px; height: 34px; cursor: pointer; font-size: 17px; color: var(--text-secondary); display: grid; place-items: center; }
  .cv-back:hover { background: var(--surface-subtle); }
  .cv-pagepill { display: flex; align-items: center; gap: 9px; border: 1px solid var(--border-default);
    border-radius: var(--radius-m); padding: 6px 11px 6px 8px; box-shadow: var(--shadow-card); }
  .cv-pagepill .pn { width: 22px; height: 22px; border-radius: 6px; background: var(--surface-alt);
    display: grid; place-items: center; font-size: 11px; font-weight: 800; color: var(--text-secondary); }
  .cv-pagepill .pt { font-size: 14px; font-weight: 800; color: var(--text-emphasis); }
  .cv-pagepill .chev { color: var(--text-secondary); font-size: 11px; }
  .cv-top .spacer { flex: 1; }
  .cv-zoomsel { border: 1px solid var(--border-default); background: var(--surface-default); border-radius: var(--radius-m);
    padding: 7px 11px; font: inherit; font-size: 13px; font-weight: 600; color: var(--text-primary); cursor: pointer; }

  .cv-pad { position: relative; flex: 1; overflow: hidden; }
  .cv-stage { position: absolute; top: 0; left: 0; transform-origin: 0 0; cursor: grab;
    background-image: radial-gradient(var(--border-subtle) 1.1px, transparent 1.1px); background-size: 24px 24px; }
  .cv-stage.grabbing { cursor: grabbing; }

  /* lanes + phases */
  .cv-lane { position: absolute; left: 0; }
  .cv-lane .ll { position: absolute; left: 14px; top: 50%; transform: translateY(-50%) rotate(180deg);
    writing-mode: vertical-rl; font-size: 13px; font-weight: 800; letter-spacing: .04em; }
  .cv-lane .accent { position: absolute; left: 30px; top: 0; bottom: 0; width: 5px; }
  .cv-divider { position: absolute; top: 0; border-left: 1.5px dashed var(--border-default); }
  .cv-phase { position: absolute; }
  .cv-phase .pt { font-size: 17px; font-weight: 800; color: var(--text-emphasis); }
  .cv-phase .ps { font-size: 11px; font-weight: 700; letter-spacing: .08em; color: var(--text-secondary);
    font-family: var(--source-code-font-family, monospace); margin-top: 2px; }

  /* nodes */
  .node { position: absolute; background: var(--surface-default); border: 1px solid var(--border-default);
    border-radius: 11px; box-shadow: var(--shadow-card); }
  .node .ntab { position: absolute; top: -11px; left: 13px; display: inline-flex; align-items: center; gap: 5px;
    font-size: 9.5px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; padding: 3px 8px;
    border-radius: 6px; box-shadow: var(--shadow-card); white-space: nowrap; }
  .node .ntab .sdot { width: 6px; height: 6px; border-radius: 50%; background: var(--green-default); }
  .node .deco { height: 22px; margin: 1px 1px 0; border-radius: 10px 10px 0 0; opacity: .55;
    background-repeat: repeat-x; background-position: center;
    background-image: url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='46'%20height='22'%3E%3Cpath%20d='M0%2014%20q5.75%20-7%2011.5%200%20t11.5%200%20t11.5%200%20t11.5%200'%20fill='none'%20stroke='%23cfc6e8'%20stroke-width='1.5'/%3E%3Ccircle%20cx='6'%20cy='6'%20r='1.4'%20fill='%23cfc6e8'/%3E%3C/svg%3E"); }
  .node .ttl { padding: 9px 13px 12px; font-size: 12.5px; font-weight: 700; color: var(--text-emphasis); line-height: 1.3; }

  .ntab-recipe     { background:#e8e6fb; color:#5448ad; }
  .ntab-function   { background:var(--purple-tint); color:var(--purple-emphasis); }
  .ntab-skill      { background:var(--purple-tint); color:var(--purple-emphasis); }
  .ntab-kb         { background:#fbe6f1; color:#a83a76; }
  .ntab-mcp        { background:var(--orange-subtle); color:var(--orange-emphasis); }
  .ntab-page       { background:var(--teal-subtle); color:var(--teal-emphasis); }
  .ntab-pipeline   { background:var(--teal-subtle); color:var(--teal-emphasis); }
  .ntab-connection { background:var(--blue-subtle); color:var(--blue-emphasis); }
  .node .ntab .sdot.s-draft { background:#9aa6b6; }
  .node .ntab .sdot.s-attn  { background:var(--red-default); }

  .node.genie { background: linear-gradient(135deg,#efeafd,#fdf2fb); border-color:#d9d3f5; }
  .node.genie .gbody { display:flex; align-items:center; gap:10px; padding:13px 14px; }
  .node.genie .gav { width:34px; height:34px; border-radius:9px; flex:none;
    background: linear-gradient(135deg,var(--purple-default),#8a6fe0); display:grid; place-items:center; font-size:17px; }
  .node.genie .gt { font-size:13.5px; font-weight:800; color:var(--purple-emphasis); }

  .node.claude { background: linear-gradient(160deg,#e8704f,#d2502e); border:1px solid #c5471f;
    display:grid; place-items:center; box-shadow:0 6px 16px rgba(210,80,46,.3); }
  .node.claude .burst { width:54px; height:54px; }
  .cv-claude-label { position:absolute; font-size:12px; font-weight:700; color:var(--text-primary); text-align:center; }

  .diamond { position:absolute; background:#ffdf86; border:1px solid #eac042; transform:rotate(45deg);
    display:grid; place-items:center; box-shadow: var(--shadow-card); border-radius:8px; }
  .diamond span { transform:rotate(-45deg); font-size:12px; font-weight:800; letter-spacing:.05em; color:#7a5600; text-align:center; }

  .outcome { position:absolute; border-radius:12px; display:grid; place-items:center; text-align:center;
    font-size:13px; font-weight:700; padding:0 16px; line-height:1.3; }
  .outcome.orange { background:var(--orange-subtle); border:1px solid var(--orange-muted); color:#8a4a00; }
  .trigger { position:absolute; border-radius:12px; display:grid; place-items:center; text-align:center;
    font-size:13.5px; font-weight:700; padding:0 16px; line-height:1.3;
    background:#d4e7fb; border:1px solid var(--blue-muted); color:#15497f; }

  .cv-group { position:absolute; border:1.5px dashed var(--border-default); border-radius:14px; background: rgba(255,255,255,.4); }
  .cv-group .glabel { position:absolute; top:-11px; left:16px; font-size:10px; font-weight:800; text-transform:uppercase;
    letter-spacing:.05em; background:var(--surface-default); border:1px solid var(--border-subtle); border-radius:6px;
    padding:2px 9px; color:var(--text-secondary); }

  .cv-note { position:absolute; background:#ffe7a8; border-radius:4px; padding:16px 15px 18px;
    box-shadow:0 8px 18px rgba(120,80,0,.18); }
  .cv-note .tape { position:absolute; top:-9px; left:50%; transform:translateX(-50%) rotate(-3deg);
    width:74px; height:18px; background:rgba(214,150,40,.4); border-radius:1px; }
  .cv-note .nh { font-size:12.5px; font-weight:800; font-style:italic; color:#9a6a00; margin-bottom:9px; }
  .cv-note ul { margin:0; padding-left:16px; }
  .cv-note li { font-size:11.5px; color:#8a5e00; line-height:1.4; margin-bottom:6px; }

  .cv-clabel { position:absolute; font-size:11px; font-weight:700; color:var(--text-secondary);
    background:var(--surface-subtle); padding:1px 7px; border-radius:5px; }

  /* ── Modal ── */
  .scrim { position: fixed; inset: 0; background: rgba(26,29,33,.45); z-index: 50;
    display: none; align-items: center; justify-content: center; padding: 24px; }
  .scrim.open { display: flex; }
  .modal { background: var(--surface-default); border-radius: var(--radius-l); width: 520px; max-width: 100%;
    box-shadow: var(--shadow-pop); overflow: hidden; animation: pop .14s ease-out; }
  @keyframes pop { from { transform: scale(.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal .mh { padding: 18px 20px 14px; border-bottom: 1px solid var(--border-subtle); display: flex; gap: 12px; align-items: flex-start; }
  .modal .mh .mt { font-size: 17px; font-weight: 800; color: var(--text-emphasis); }
  .modal .mh .ms { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }
  .modal .mh .x { margin-left: auto; border: 0; background: transparent; font-size: 20px; cursor: pointer; color: var(--text-secondary); }
  .modal .mb { padding: 18px 20px; }
  .modal .mb p { font-size: 13.5px; color: var(--text-secondary); line-height: 1.5; margin: 0 0 14px; }
  .modal .mb .row { display: flex; gap: 10px; margin-bottom: 8px; font-size: 13px; }
  .modal .mb .row .k { width: 110px; color: var(--text-secondary); flex: none; }
  .modal .mb .row .v { font-weight: 600; color: var(--text-primary); }
  .modal .mf { padding: 14px 20px; border-top: 1px solid var(--border-subtle); display: flex; gap: 10px; justify-content: flex-end; }
  .modal .preview-strip { display:flex; align-items:center; gap:6px; background: var(--surface-subtle);
    border:1px solid var(--border-subtle); border-radius: var(--radius-m); padding: 14px; margin-bottom: 16px; }
  .modal .pv-node { padding: 6px 9px; border-radius: var(--radius-s); font-size: 11px; font-weight: 700; white-space: nowrap; }
  .modal .pv-ar { color: var(--border-default); }

  /* ── AIRO floating chat ── */
  .airo { position: absolute; top: 60px; right: 16px; width: 336px; height: calc(100% - 76px); z-index: 12;

  ],

};

const COLORS = {
  gray:  {def:"var(--gray-default)",  head:"var(--gray-tint)",   body:"var(--gray-tint)",   border:"var(--border-default)", fg:"var(--text-primary)"},
  blue:  {def:"var(--blue-default)",  head:"var(--blue-subtle)", body:"var(--blue-tint)",   border:"var(--blue-subtle)",    fg:"var(--blue-emphasis)"},
  orange:{def:"var(--orange-default)",head:"var(--orange-subtle)",body:"var(--orange-tint)",border:"var(--orange-subtle)",  fg:"var(--orange-emphasis)"},
  purple:{def:"var(--purple-default)",head:"var(--purple-subtle)",body:"var(--purple-tint)",border:"var(--purple-subtle)",  fg:"var(--purple-emphasis)"},
  green: {def:"var(--green-default)", head:"var(--green-subtle)",body:"var(--green-tint)",  border:"var(--green-subtle)",   fg:"var(--green-emphasis)"},
  teal:  {def:"var(--teal-default)",  head:"var(--teal-subtle)", body:"var(--teal-tint)",  border:"var(--teal-subtle)",    fg:"var(--teal-emphasis)"},
};

/* ───────── render ───────── */
const stage = document.getElementById("stage");

function pill(status){
  const map = {live:["live","Live"], draft:["draft","Draft"], attn:["attn","Needs attention"]};
  const [c,l] = map[status] || map.draft;
  return `<span class="pill ${c}">${l}</span>`;
}
/* shared spec layout — used by the card mini-map AND the full generic canvas */
const LY = { COLW:300, LANEH:184, OX:56, OY:64, NW:226, NH:74, STACKDY:88 };
function layoutSpec(spec){
  const cols = spec.phases.length, rows = spec.lanes.length;
  const cellCount = {};
  const nodes = spec.steps.map(s=>{
    const key = s.l+"_"+s.p; const idx = cellCount[key]||0; cellCount[key]=idx+1;
    return { ...s, x: LY.OX + s.p*LY.COLW, y: LY.OY + s.l*LY.LANEH + 18 + idx*LY.STACKDY, w: LY.NW, h: LY.NH };
  });
  const W = LY.OX + cols*LY.COLW + 24, H = LY.OY + rows*LY.LANEH + 24;
  const lanes = spec.lanes.map((l,i)=>({ ...l, y: LY.OY + i*LY.LANEH, h: LY.LANEH }));
  const phases = spec.phases.map((t,j)=>({ t, x: LY.OX + j*LY.COLW }));
  return { nodes, lanes, phases, W, H, cols, rows };
}
function progressOf(p){
  const steps = p.canvas?.steps || [];
  const live = steps.filter(s=>s.s==="live").length;
  return { live, total: steps.length, pct: steps.length ? Math.round(live/steps.length*100) : 0 };
}
function miniMap(p){
  const lay = layoutSpec(p.canvas);
  const pc = x => (x/lay.W*100).toFixed(2)+"%";
  const pr = y => (y/lay.H*100).toFixed(2)+"%";
  let h = "";
  lay.lanes.forEach(l=>{ const c=COLORS[l.c]||COLORS.gray;
    h += `<div class="mm-lane" style="top:${pr(l.y)};height:${pr(l.h)};background:${c.body};border-color:${c.border}"></div>`; });
  lay.nodes.forEach(n=>{
    h += `<div class="mm-node s-${n.s}" style="left:${pc(n.x)};top:${pr(n.y)};width:${pc(n.w)};height:${pr(n.h)}"></div>`; });
  return `<div class="mini" style="aspect-ratio:${lay.W} / ${lay.H}">${h}</div>`;
}
function projectCard(p, color){
  const pr = progressOf(p);
  return `<div class="card" data-proj="${p.name}">
    <div class="ct"><div class="title">${p.name}</div>${pill(p.status)}</div>
    ${miniMap(p)}
    <div class="prog"><div class="bar"><i style="width:${pr.pct}%"></i></div><span>${pr.live} of ${pr.total} steps live</span></div>
    <div class="chips">${p.chips.map(x=>`<span class="chip">${x}</span>`).join("")}</div>
    <div class="foot"><span>Edited ${p.edited}</span></div>
  </div>`;
}

function templateCard(tp){
  return `<div class="tpl" data-tpl="${tp.t}">
    <div class="tl"><span class="badge">Template</span>${tp.t}</div>
    <div class="td">${tp.d}</div>
  </div>`;
}

function render(filter=""){
  const f = filter.trim().toLowerCase();
  stage.innerHTML = FUNCS.map(fn=>{
    const c = COLORS[fn.color];
    let projs = PROJECTS[fn.key] || [];
    if(f) projs = projs.filter(p=>p.name.toLowerCase().includes(f));
    const empty = (PROJECTS[fn.key]||[]).length === 0;

    let bodyInner = "";
    if(empty){
      bodyInner += `<div class="empty">
        <div class="em-ic">🌱</div>
        <div class="em-t">No automation here yet</div>
        <div class="em-d">${fn.name} teams like yours usually start with lead routing and campaign ops. Browse templates to see what they build.</div>
        <button class="btn primary" style="font-size:12.5px;padding:7px 12px" data-goto-templates="1">Browse templates</button>
      </div>`;
    } else {
      bodyInner += projs.map(p=>projectCard(p, fn.color)).join("");
      if(f && !projs.length){
        bodyInner += `<div class="empty"><div class="em-d" style="margin:0">No match in ${fn.name}.</div></div>`;

function projByName(name){
  for(const k in PROJECTS){ const hit=PROJECTS[k].find(p=>p.name===name); if(hit) return hit; }
  return null;
}
function gnodeHTML(n){
  const s=`left:${n.x}px;top:${n.y}px;width:${n.w}px;height:${n.h}px`;
  if(n.t==="trigger")  return `<div class="trigger" style="${s}">${n.n}</div>`;
  if(n.t==="outcome")  return `<div class="outcome orange" style="${s}">${n.n}</div>`;
  if(n.t==="genie")    return `<div class="node genie" style="${s}"><div class="gbody"><div class="gav">🤖</div><div class="gt">${n.n}</div></div></div>`;
  if(n.t==="decision") return `<div class="diamond" style="left:${n.x+ (n.w-92)/2}px;top:${n.y}px;width:92px;height:92px"><span>${n.n}</span></div>`;
  return `<div class="node" style="${s}">
    <span class="ntab ntab-${n.t}">${TAB_LABEL[n.t]||n.t}<span class="sdot s-${n.s}"></span></span>
    <div class="deco"></div><div class="ttl">${n.n}</div>
  </div>`;
}
function renderGenericCanvas(p){
  const lay = layoutSpec(p.canvas);
  const st = document.getElementById("cvStage");
  st.style.width=lay.W+"px"; st.style.height=lay.H+"px";
  let html="";
  lay.lanes.forEach(l=>{ const c=COLORS[l.c]||COLORS.gray;
    html += `<div class="cv-lane" style="top:${l.y}px;height:${l.h}px;width:${lay.W}px;background:${c.body}">
      <div class="accent" style="background:${c.def}"></div><div class="ll" style="color:${c.fg}">${l.n}</div></div>`; });
  for(let j=1;j<lay.cols;j++){ const x=LY.OX+j*LY.COLW-30;
    html += `<div class="cv-divider" style="left:${x}px;height:${lay.H}px"></div>`; }
  lay.phases.forEach(ph=> html += `<div class="cv-phase" style="left:${ph.x}px;top:14px"><div class="pt" style="font-size:15px">${ph.t}</div></div>`);
  // connectors: link each step to the next in sequence
  let lines="";
  for(let i=0;i<lay.nodes.length-1;i++){ const a=lay.nodes[i], b=lay.nodes[i+1];
    const ax=a.x+a.w, ay=a.y+a.h/2, bx=b.x, by=b.y+b.h/2;
    let d;
    if(bx>=a.x+a.w-4) d=`M${ax} ${ay} H${(ax+bx)/2} V${by} H${bx}`;
    else d=`M${a.x+a.w/2} ${a.y+a.h} V${by} H${bx}`;
    lines += `<path d="${d}" fill="none" stroke="#aab2bf" stroke-width="2" marker-end="url(#cvArrow)"/>`;
  }
  html += `<svg width="${lay.W}" height="${lay.H}" style="position:absolute;inset:0;pointer-events:none">
    <defs><marker id="cvArrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#aab2bf"/></marker></defs>${lines}</svg>`;
  lay.nodes.forEach(n=> html += gnodeHTML(n));
  st.innerHTML = html;
  return lay;
}

let lastSrcRect = null;
function fitView(W,H){
  const vw = window.innerWidth, vh = window.innerHeight - 58;
  cz = Math.min(0.95, (vw-80)/W, (vh-60)/H);
  cpx = Math.max(20, (vw - W*cz)/2); cpy = Math.max(20, (vh - H*cz)/2);

function openCanvas(name, srcEl){

  else { const p=projByName(name); const lay=renderGenericCanvas(p); fitView(lay.W, lay.H); }

  // Prezi-style zoom-in from the clicked thumbnail
  cv.classList.add("open");

    cv.style.transformOrigin = "0 0";

    cv.style.transform = `translate(${r.left}px,${r.top}px) scale(${r.width/window.innerWidth},${r.height/window.innerHeight})`;
    cv.style.opacity = ".55";
    requestAnimationFrame(()=>{ requestAnimationFrame(()=>{
      cv.style.transition = "transform .44s cubic-bezier(.33,0,.2,1), opacity .34s";
      cv.style.transform = "none"; cv.style.opacity = "1";
    }); });
  }
}
function closeCanvas(){
  const r = lastSrcRect;
  if(r){
    cv.style.transition = "transform .36s cubic-bezier(.4,0,.6,1), opacity .3s";
    cv.style.transform = `translate(${r.left}px,${r.top}px) scale(${r.width/window.innerWidth},${r.height/window.innerHeight})`;
    cv.style.opacity = "0";
    const done = ()=>{ cv.classList.remove("open"); cv.style.transition="none"; cv.style.transform="none"; cv.style.opacity="1";
      cv.removeEventListener("transitionend", done); };
    cv.addEventListener("transitionend", done);

}

document.addEventListener("keydown", e=>{ if(e.key==="Escape" && cv.classList.contains("open")) closeCanvas(); });

let cdrag=false, csx=0, csy=0, cox=0, coy=0;
cvStage.addEventListener("mousedown", e=>{ cdrag=true; cvStage.classList.add("grabbing");
  csx=e.clientX; csy=e.clientY; cox=cpx; coy=cpy; });
window.addEventListener("mousemove", e=>{ if(!cdrag) return; cpx=cox+(e.clientX-csx); cpy=coy+(e.clientY-csy); cvApply(); });
window.addEventListener("mouseup", ()=>{ cdrag=false; cvStage.classList.remove("grabbing"); });
document.querySelector(".cv-pad").addEventListener("wheel", e=>{
  if(e.ctrlKey){ e.preventDefault(); cvSetZoom(cz - e.deltaY*0.002); return; }
  cpx-=e.deltaX; cpy-=e.deltaY; cvApply();
}, {passive:false});

/* ═══════════ AIRO floating chat + sub-agents ═══════════ */
const airo = document.getElementById("airo");
const airoHead = document.getElementById("airoHead");
const airoMsgs = document.getElementById("airoMsgs");
const airoEmpty = document.getElementById("airoEmpty");
const airoInput = document.getElementById("airoInput");
const airoFab = document.getElementById("airoFab");
const subWrap = document.getElementById("subagents");

function resetAiro(){
  airoMsgs.innerHTML = ""; airoMsgs.classList.remove("show"); airoEmpty.style.display = "";
  subWrap.innerHTML = ""; airoBusy = false;
  airo.style.left = ""; airo.style.top = ""; airo.style.right = "16px"; airo.style.bottom = "";
  airo.style.display = ""; airoFab.classList.remove("show");
}

/* drag the panel anywhere within the canvas pad */
(function(){
  let d=false, sx, sy, ol, ot;
  airoHead.addEventListener("mousedown", e=>{
    if(e.target.closest("button")) return;
    d=true; airo.classList.add("dragging"); airoHead.classList.add("grab");
    const r=airo.getBoundingClientRect(), pr=airo.parentElement.getBoundingClientRect();
    ol=r.left-pr.left; ot=r.top-pr.top; sx=e.clientX; sy=e.clientY;
    airo.style.right="auto"; airo.style.bottom="auto"; airo.style.left=ol+"px"; airo.style.top=ot+"px";
    e.preventDefault();
  });
  window.addEventListener("mousemove", e=>{
    if(!d) return;
    const pr=airo.parentElement.getBoundingClientRect();
    let nx=ol+(e.clientX-sx), ny=ot+(e.clientY-sy);
    nx=Math.max(8, Math.min(nx, pr.width-airo.offsetWidth-8));
    ny=Math.max(8, Math.min(ny, pr.height-60));
    airo.style.left=nx+"px"; airo.style.top=ny+"px";
  });
  window.addEventListener("mouseup", ()=>{ d=false; airo.classList.remove("dragging"); airoHead.classList.remove("grab"); });
})();

document.getElementById("airoMin").addEventListener("click", ()=>{ airo.style.display="none"; airoFab.classList.add("show"); });
airoFab.addEventListener("click", ()=>{ airo.style.display=""; airoFab.classList.remove("show"); });
document.getElementById("airoNew").addEventListener("click", ()=>{
  airoMsgs.innerHTML=""; airoMsgs.classList.remove("show"); airoEmpty.style.display=""; subWrap.innerHTML=""; airoBusy=false;
  cvStage.querySelectorAll(".working, .worked").forEach(el=>{ el.classList.remove("working","worked");
    if(el._worker){el._worker.remove();el._worker=null;} if(el._sh){el._sh.remove();el._sh=null;} });
});

function airoMsg(kind, html){
  const el=document.createElement("div"); el.className="amsg "+kind; el.innerHTML=html;
  airoMsgs.appendChild(el); airoMsgs.scrollTop=airoMsgs.scrollHeight; return el;
}
airoInput.addEventListener("keydown", e=>{ if(e.key==="Enter" && airoInput.value.trim()){ sendAiro(airoInput.value.trim()); airoInput.value=""; } });
document.getElementById("airoSend").addEventListener("click", ()=>{ if(airoInput.value.trim()){ sendAiro(airoInput.value.trim()); airoInput.value=""; } });
document.querySelectorAll(".airo-suggest button").forEach(b=> b.addEventListener("click", ()=>{
  if(b.getAttribute("data-uc")) sendAiro(USE_CASE.q, USE_CASE.tasks.map(t=>({...t})));
  else sendAiro(b.getAttribute("data-q"));
}));

const ROLE_AV = { "Flow Architect":"🛠", "Docs Writer":"📝", "Validator":"✓", "Recipe Builder":"⚙",
  "Connection Mapper":"🔗", "Compliance Reviewer":"🛡" };

/* the one-click use case — 5 agents work the canvas together */
const USE_CASE = {
  q: "Make this flow audit-ready",
  tasks: [
    { role:"Flow Architect",      verb:"Adding",      asset:"Manager Approval step", kind:"add", node:{t:"recipe",n:"Manager Approval"} },
    { role:"Validator",           verb:"Hardening",   asset:"error paths",           kind:"editKey", key:"if" },
    { role:"Docs Writer",         verb:"Documenting", asset:"every step",            kind:"editMany", count:2 },
    { role:"Connection Mapper",   verb:"Wiring",      asset:"Slack notifications",   kind:"editNth", i:3 },
    { role:"Compliance Reviewer", verb:"Adding",      asset:"Audit Log step",        kind:"add", node:{t:"recipe",n:"Write Audit Log"} },
  ]
};

function planTasks(text){
  const t=text.toLowerCase(), tasks=[];
  if(/(add|approval|step|create|build|insert)/.test(t))
    tasks.push({ role:"Flow Architect", verb:"Adding", asset:"Manager Approval", kind:"add", node:{t:"recipe",n:"Manager Approval"} });
  if(/(document|describe|explain|annotate)/.test(t))
    tasks.push({ role:"Docs Writer", verb:"Documenting", asset:"flow steps", kind:"editMany", count:3 });
  if(/(error|gap|fail|validate|check|risk)/.test(t))
    tasks.push({ role:"Validator", verb:"Checking", asset:"error paths", kind:"editKey", key:"if" });
  if(!tasks.length){
    tasks.push({ role:"Flow Architect", verb:"Updating", asset:"canvas", kind:"editNth", i:1 });
    tasks.push({ role:"Validator", verb:"Validating", asset:"logic", kind:"editNth", i:2 });
  }
  return tasks;
}

function canvasNodes(){ return Array.from(cvStage.querySelectorAll(".node, .trigger, .diamond, .genie, .outcome")); }

/* in-canvas loading view: a worker badge + shimmer sweep on the asset being edited */
function workNode(el, role){
  if(!el) return;
  el.classList.add("working");
  const w=document.createElement("div"); w.className="worker";
  w.innerHTML=`<span class="wav">${ROLE_AV[role]||"🤖"}</span><span class="wlabel">${role}</span><span class="wspin"></span>`;
  el.appendChild(w); el._worker=w;
  const sh=document.createElement("div"); sh.className="work-shimmer"; el.appendChild(sh); el._sh=sh;
}
function doneNode(el){
  if(!el) return;
  el.classList.remove("working"); el.classList.add("worked");
  if(el._worker){ const sp=el._worker.querySelector(".wspin"); if(sp) sp.outerHTML=`<span class="wchk">✓</span>`; }
  setTimeout(()=>{ if(el._worker){el._worker.remove(); el._worker=null;} if(el._sh){el._sh.remove(); el._sh=null;} el.classList.remove("worked"); }, 1300);
}

/* activity timeline inside the AIRO panel */
function makeTimelineCard(tasks){
  const card=document.createElement("div"); card.className="amsg bot atl-card";
  const tl=document.createElement("div"); tl.className="atl";
  tasks.forEach(t=>{
    const it=document.createElement("div"); it.className="atl-item queued";
    it.innerHTML=`<div class="atl-rail"><span class="atl-dot"></span></div>
      <div class="atl-body"><div class="atl-head"><span class="av">${ROLE_AV[t.role]||"🤖"}</span><b>${t.role}</b><span class="atl-st">Queued</span></div>
      <div class="atl-sub">${t.verb} ${t.asset}</div></div>`;
    tl.appendChild(it); t._tl=it;
  });
  card.appendChild(tl); airoMsgs.appendChild(card); airoMsgs.scrollTop=airoMsgs.scrollHeight;
  return card;
}
function tlSet(t, state, label){ if(!t._tl) return; t._tl.className="atl-item "+state;
  const st=t._tl.querySelector(".atl-st"); if(st) st.textContent=label; }

let addSlot=0;
function startTask(t){
  tlSet(t, "active", "Working…");
  t._touched=[];
  const nodes=canvasNodes();
  if(t.kind==="add"){
    const stageH=parseFloat(cvStage.style.height)||900;
    const left=70 + addSlot*270; const top=stageH-150; addSlot++;
    const el=document.createElement("div"); el.className="node justadded";
    el.style.cssText=`left:${left}px;top:${top}px;width:226px;height:74px`;
    el.innerHTML=`<span class="ntab ntab-${t.node.t}">${TAB_LABEL[t.node.t]||t.node.t}<span class="sdot s-live"></span></span><div class="deco"></div><div class="ttl">${t.node.n}</div>`;
    cvStage.appendChild(el); workNode(el, t.role); t._touched.push(el);
  } else if(t.kind==="editKey"){
    const el=nodes.find(n=>(n.textContent||"").toLowerCase().includes(t.key)) || nodes[2];
    workNode(el, t.role); t._touched.push(el);
  } else if(t.kind==="editMany"){
    nodes.slice(0,t.count).forEach(n=>{ workNode(n, t.role); t._touched.push(n); });
  } else if(t.kind==="editNth"){
    workNode(nodes[t.i], t.role); t._touched.push(nodes[t.i]);
  }
}
function finishTask(t){
  (t._touched||[]).forEach(el=> doneNode(el));
  tlSet(t, "done", "Done");
}

let airoBusy=false;
function sendAiro(text, tasks){
  airoEmpty.style.display="none"; airoMsgs.classList.add("show");
  airoMsg("user", text);
  if(airoBusy) return;
  airoBusy=true; addSlot=0;
  tasks = tasks || planTasks(text);
  const thinking=airoMsg("bot", `<span class="dots"><span></span><span></span><span></span></span>`);
  setTimeout(()=>{
    thinking.innerHTML = `Spinning up ${tasks.length} agents to work the canvas together — here's the activity:`;
    makeTimelineCard(tasks);
    // start them together (small ripple so badges pop in, but all active at once)
    tasks.forEach((t,i)=> setTimeout(()=> startTask(t), 200 + i*130));
    const finishAt = 200 + tasks.length*130 + 2100;
    tasks.forEach((t,i)=> setTimeout(()=> finishTask(t), finishAt + i*260));
    setTimeout(()=>{
      const added = tasks.filter(t=>t.kind==="add").map(t=>`<b>${t.node.n}</b>`);
      airoMsg("bot", `All done — ${tasks.length} agents finished${added.length?`. Added ${added.join(" and ")}.`:"."}`);
      airoBusy=false;
    }, finishAt + tasks.length*260 + 500);
  }, 700);
}
</script>
