<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AIRO Checkpoints — History takeover (Lovable style)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.34.0/tabler-icons.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Roboto+Mono&display=swap">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#eef1f6;font-family:'Source Sans 3',-apple-system,sans-serif;color:#373d47}
  .mono{font-family:'Roboto Mono',Menlo,monospace}
  .frame{padding:14px;height:100vh}
  .app{height:100%;background:#fff;border:1px solid #d5dbe4;border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
  .appbar{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid #e5eaf1;flex-shrink:0}
  .appbar .ttl{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600}
  .appbar .ttl i{color:#586373}
  .grow{flex:1}
  .btn{font-size:12px;padding:6px 12px;border-radius:8px;border:1px solid #d5dbe4;background:#fff;cursor:pointer;color:#373d47;display:inline-flex;align-items:center;gap:6px}
  .btn:hover{background:#f4f6fa}
  .btn-pri{font-size:12px;padding:6px 12px;border-radius:8px;border:1px solid #1a57e5;background:#1a57e5;color:#fff;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .btn-pri:hover{background:#1549c0}

  /* viewing-a-version bar */
  /* The "Viewing / Revert to this version" bar is intentionally never shown:
     clicking a change just previews the diff, it does not enter a revert flow. */
  .vbar{display:none !important;align-items:center;gap:10px;padding:9px 14px;background:#1f2937;color:#fff;flex-shrink:0}
  .vbar .pill{background:#374a63;border-radius:999px;padding:3px 11px;font-size:12px}
  .vbar .vlabel{font-size:12.5px;color:#c7d2de}
  .vbar .back{cursor:pointer;color:#c7d2de;font-size:12.5px;display:inline-flex;align-items:center;gap:5px}
  .vbar .back:hover{color:#fff}

  .body{flex:1;min-height:0;display:flex}
  .editor{flex:1;min-width:0;display:flex;flex-direction:column;background:#fbfcfe}
  body.viewing .editor{background:#f5f7fb}
  .ehead{display:flex;align-items:center;justify-content:space-between;padding:7px 13px;border-bottom:1px solid #e5eaf1;flex-shrink:0;font-size:12px;color:#586373;min-height:46px}
  .code{flex:1;overflow:auto;padding:8px 0;font-size:12.5px;line-height:1.95;color:#586373}
  .cline{display:flex}
  .cn{width:38px;text-align:right;padding-right:8px;color:#aab3c0;font-size:11px;flex-shrink:0;user-select:none}
  .cg{width:16px;text-align:center;flex-shrink:0;user-select:none;color:#9aa4b2;font-size:11px}
  .ct{white-space:pre}
  /* diff highlighting */
  .cline.add{background:#e9f7ee}
  .cline.del{background:#fdecec}
  .cline.add .cg{color:#1a7f37;font-weight:700}
  .cline.del .cg{color:#b42318;font-weight:700}
  .cline.add .ct{color:#1f2328}
  .cline.del .ct{color:#b42318}
  .cline.hl{box-shadow:inset 3px 0 0 #1a57e5}
  @keyframes hlblink{0%,100%{background:#cfe0ff}50%{background:transparent}}
  .code .cline.hl.blink{animation:hlblink .55s ease-in-out 3}
  .empty{padding:16px;color:#8a96a3;font-size:12.5px}
  /* split view: before | after columns */
  .splitwrap{display:flex;min-height:100%}
  .scol{flex:1;min-width:0;overflow:hidden;border-right:1px solid #eef1f6}
  .scol:last-child{border-right:none}
  .scol-h{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#8a96a3;padding:5px 12px;background:#fbfcfe;border-bottom:1px solid #eef1f6}
  /* diff / full toggle in editor head (only while viewing) */
  .ehright{display:inline-flex;align-items:center;gap:10px}
  .vtog{display:none;gap:0;border:1px solid #d5dbe4;border-radius:7px;overflow:hidden}
  body.viewing .vtog{display:inline-flex}
  .vtog .vt{font-size:11.5px;padding:3px 10px;cursor:pointer;color:#586373;background:#fff}
  .vtog .vt+.vt{border-left:1px solid #d5dbe4}
  .vtog .vt.on{color:#1a57e5;background:#f4f8ff;font-weight:600}
  /* per-version change chips in the history list */
  .chg{margin-left:8px;font-size:10.5px;font-weight:600}
  .chg .ca{color:#1a7f37;margin-right:5px}
  .chg .cd{color:#b42318}

  /* AIRO panel <-> history takeover */
  .panel{width:380px;flex-shrink:0;display:flex;flex-direction:column;border-left:1px solid #e5eaf1;background:#fff}
  .phead{display:flex;align-items:center;gap:6px;padding:10px 14px;border-bottom:1px solid #e5eaf1;flex-shrink:0;min-height:46px}
  .dchev{color:#1a57e5;font-weight:700;letter-spacing:-3px;font-size:15px}
  .pname{font-size:14px;font-weight:600;color:#1a57e5}
  .beta{font-size:10px;padding:1px 6px;border-radius:6px;background:#dce6ff;color:#1a57e5}
  .hbtn{margin-left:auto;cursor:pointer;color:#586373;font-size:12.5px;display:inline-flex;align-items:center;gap:5px;border:1px solid #d5dbe4;border-radius:8px;padding:5px 10px}
  .hbtn:hover{background:#f4f6fa}
  .hbtn.on{border-color:#1a57e5;color:#1a57e5;background:#f4f8ff}
  .hbtn.disabled{opacity:.4;cursor:default;pointer-events:none}

  .chat{flex:1;overflow:auto;padding:14px}
  .urow{display:flex;justify-content:flex-end;margin-bottom:9px}
  .ubub{background:#dce6ff;max-width:84%;padding:9px 12px;border-radius:13px 13px 4px 13px;font-size:13px;line-height:1.45}
  .arow{display:flex;align-items:center;gap:7px;font-size:12.5px;color:#586373;margin-bottom:6px}
  .arow .ck{width:16px;height:16px;border-radius:50%;background:#1a57e5;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;flex-shrink:0}
  .cpsaved{display:flex;align-items:center;gap:8px;margin:6px 0 16px;font-size:11.5px;color:#7a8694;cursor:pointer}
  .cpsaved::before,.cpsaved::after{content:'';flex:1;border-top:1px dashed #d7dde6}
  .cpsaved i{color:#9aa4b2;font-size:13px}
  .cpsaved:hover{color:#1a57e5}
  .cpsaved:hover i,.cpsaved:hover .cpchev{color:#1a57e5}
  .cpsaved .cpchev{font-size:13px;color:#aab3c0}
  /* AIRO thought + narration + edit step in the conversation */
  .thought{display:flex;align-items:center;gap:7px;font-size:12.5px;color:#8a8fa3;margin:2px 0 10px}
  .thought i{font-size:15px}
  .say{font-size:13px;line-height:1.5;color:#2f353e;margin:2px 0 9px}
  .estep{display:flex;align-items:center;gap:9px;padding:4px 6px;border-radius:6px;margin:0 0 9px;cursor:pointer}
  .estep:hover{background:#f6f8fb}
  .estep .ei{color:#586373;font-size:16px;flex-shrink:0}
  .estep .et{font-size:13px;color:#1f2328;flex:1;min-width:0}
  .estep .ef{font-family:'Roboto Mono',monospace;font-size:11px;background:#f0f3f8;color:#586373;padding:2px 7px;border-radius:6px;flex-shrink:0}
  .estep .ed{font-size:11.5px;flex-shrink:0;font-family:'Roboto Mono',monospace}
  .estep .ec{color:#aab3c0;font-size:15px;flex-shrink:0}
  .pos{color:#2f7d46}.neg{color:#b42318}
  /* change folded inline into the narration text (no box, no icon) */
  .say .chglink{color:#1f2328;cursor:pointer}
  .say .chglink:hover{text-decoration:underline}
  .say .ed{font-family:'Roboto Mono',monospace;font-size:11.5px;margin-left:6px}

  /* history list */
  .hround{display:flex;align-items:baseline;gap:8px;padding:13px 12px 5px}
  .hround .hr-t{font-size:11px;text-transform:uppercase;letter-spacing:.04em;font-weight:700;color:#8a96a3}
  .hround .hr-time{font-size:11px;color:#bcc3ce;margin-left:auto}
  .htabs{display:flex;gap:6px;padding:10px 12px;flex-shrink:0}
  .htab{flex:1;text-align:center;font-size:12.5px;padding:7px;border-radius:8px;color:#586373;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px}
  .htab.on{background:#eef1f6;color:#1f2328;font-weight:600}
  .hlist{flex:1;overflow:auto;padding:2px 8px 12px}
  .hitem{padding:11px 12px;border-radius:9px;cursor:pointer;border:1px solid transparent}
  .hitem:hover{background:#f4f6fa}
  .hitem.on{background:#f4f8ff;border-color:#1a57e5}
  .hitem .ht{font-size:13px;color:#1f2328;display:flex;align-items:center;gap:7px}
  .hitem .ht .dot{width:7px;height:7px;border-radius:50%;background:#9ad86a;flex-shrink:0}
  .hitem.latest .ht .dot{background:#1a57e5}
  .hitem .hw{font-size:11.5px;color:#8a96a3;margin:3px 0 0 14px}
  .hitem .htime{font-size:11px;color:#aab3c0;margin-left:auto}
  .hitem .htop{display:flex;align-items:center}

  .composer{flex-shrink:0;padding:12px 14px;border-top:1px solid #e5eaf1}
  .cbox{display:flex;align-items:center;gap:8px;border:1px solid #d5dbe4;border-radius:10px;padding:8px 11px;font-size:13px;color:#9aa4b2}
  .cbox .send{margin-left:auto;width:28px;height:28px;border-radius:50%;background:#1a57e5;color:#fff;display:flex;align-items:center;justify-content:center}
  .hide{display:none!important}

  /* review bar: redirect nav + accept/reject all (ported from Problem 3's "Accept in the editor") */
  .rv{display:flex;align-items:center;gap:8px}
  .rv .cnt{font-size:12px;color:#586373;font-family:'Roboto Mono',monospace}
  .rv .nav{width:26px;height:26px;border-radius:7px;border:1px solid #d5dbe4;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#586373}
  .rv .nav:hover{border-color:#1a57e5;color:#1a57e5}
  .rv .vbar2{width:1px;height:22px;background:#e5eaf1;margin:0 2px}
  .rv .b{font-size:12px;padding:6px 12px;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
  .rv .rej{border:1px solid #d5dbe4;background:#fff;color:#373d47}
  .rv .rej:hover{border-color:#b42318;color:#b42318}
  .rv .acc{border:1px solid #1a57e5;background:#1a57e5;color:#fff}
  .rv .acc:hover{background:#1549c0}
  @keyframes chgflash{0%,55%{box-shadow:inset 3px 0 0 #1a57e5, inset 0 0 0 400px rgba(26,87,229,.14)}100%{box-shadow:none}}
  .code .cline.flash{animation:chgflash 1.2s ease}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);display:flex;align-items:center;gap:12px;background:#1f2937;color:#fff;font-size:13px;padding:10px 14px;border-radius:10px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:20}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div class="frame"><div class="app">
  <div class="vbar">
    <span>Viewing</span><span class="pill" id="vpill"></span>
    <span class="vlabel">read-only preview of an earlier version</span>
    <span class="grow"></span>
    <span class="back" id="backLatest"><i class="ti ti-arrow-back-up"></i>Back to latest</span>
    <button class="btn-pri" id="revertBtn"><i class="ti ti-history-toggle"></i>Revert to this version</button>
  </div>

  <div class="body">
    <div class="editor">
      <div class="ehead"><span class="mono">connector.rb</span><span class="ehright"><span class="rv" id="rv"></span><span class="vtog"><span class="vt on" id="vtDiff">Unified</span><span class="vt" id="vtFull">Split</span></span><span id="estate">latest</span></span></div>
      <div class="code" id="code"></div>
    </div>
    <div class="panel">
      <div class="phead"><span class="dchev">&raquo;</span><span class="pname">AIRO</span><span class="beta">Beta</span>
        <span class="hbtn" id="hbtn"><i class="ti ti-history"></i>History</span></div>
      <!-- chat view -->
      <div id="chatView">
        <div class="chat" id="chat"></div>
        <div class="composer"><div class="cbox"><span>Ask AIRO anything</span><span class="send"><i class="ti ti-arrow-up"></i></span></div></div>
      </div>
      <!-- history view -->
      <div id="histView" class="hide" style="flex:1;display:flex;flex-direction:column;min-height:0">
        <div class="hlist" id="hlist"></div>
      </div>
    </div>
  </div>
</div></div>
<div id="toast" class="toast"></div>

<script>
const $=s=>document.querySelector(s);
const NOHIST=new URLSearchParams(location.search).has('nohist'); // Problem 4: history is out of scope, shown as a disabled placeholder
const CODE=[
  {t:"connector = {",b:'base'},
  {t:"  title: 'HubSpot',",b:'base'},
  {t:"  connection: {",b:'conn'},
  {t:"    authorization: { type: 'oauth2',",b:'conn'},
  {t:"      token_url: '/oauth/token' } },",b:'conn_token'},
  {t:"  object_definitions: {",b:'obj_deal'},
  {t:"    deal:    { fields: [...41] },",b:'obj_deal'},
  {t:"    company: { fields: [...28] },",b:'obj_company'},
  {t:"    contact: { fields: [...35] } },",b:'obj_contact'},
  {t:"  actions: {",b:'act_read'},
  {t:"    create_deal, update_deal, search_deals,",b:'act_read'},
  {t:"    create_or_update_deal, archive_deal },",b:'act_write'},
  {t:"  triggers: { new_or_updated_deal },",b:'trigger'},
  {t:"  test: ->(c) { get('/crm/v3/objects/deals?limit=1') },",b:'test'},
  {t:"}",b:'base'},
];
// Two conversation rounds. Each round narrates and shows the edits it made inline.
// Round 0 is one big build (many steps); round 1 is a follow-up. History expands every edit.
const ROUNDS=[
  { prompt:'Build a HubSpot CRM connector', title:'Built the HubSpot CRM connector', time:'2:01 PM',
    thought:'Thought for 4s',
    intro:"I'll build a full HubSpot CRM connector that exposes Deals, Companies and Contacts. It's a fair bit of work, so let me break it into steps.",
    steps:[
      {icon:'ti-search',       title:'Read the API, scoped to CRM', file:false, edits:[]},
      {icon:'ti-plug',         title:'Set up the OAuth2 connection',   before:"Now I'll set up how AIRO authenticates with HubSpot.", file:true, edits:[1,2]},
      {icon:'ti-list-details', title:'Defined Deal, Company, Contact', before:'Next, the data model the actions read and write.',     file:true, edits:[3,4,5]},
      {icon:'ti-bolt',         title:'Wrote 5 deal actions',           before:'Now the actions people will use in recipes.',          file:true, edits:[6,7]},
      {icon:'ti-clock',        title:'Added the new_or_updated_deal trigger', before:'And a trigger so recipes start when a deal changes.', file:true, edits:[8]},
    ]},
  { prompt:'Add a connection test', title:'Added a connection test', time:'2:13 PM',
    thought:null,
    intro:'Good idea. A test verifies the connection works before anyone builds a recipe on it.',
    steps:[
      {icon:'ti-plug-connected', title:'Added a connection test', file:true, edits:[9]},
    ]},
];
// One row per edit. r = which round the edit belongs to. History lists every edit; the chat shows the round + its steps.
const CPS=[
  {id:0, r:0, title:'Connector scaffold',          blocks:[],             add:5,  del:0, what:'empty connector shell'},
  {id:1, r:0, title:'Connection block',            blocks:['conn'],       add:5,  del:0, what:'connection, oauth2 authorization'},
  {id:2, r:0, title:'Token endpoint',              blocks:['conn_token'], add:1,  del:0, what:'token_url'},
  {id:3, r:0, title:'Deal object',                 blocks:['obj_deal'],   add:41, del:0, what:'object_definitions, deal (41 fields)'},
  {id:4, r:0, title:'Company object',              blocks:['obj_company'],add:28, del:0, what:'company (28 fields)'},
  {id:5, r:0, title:'Contact object',              blocks:['obj_contact'],add:15, del:0, what:'contact (35 fields)'},
  {id:6, r:0, title:'Read + create actions',       blocks:['act_read'],   add:24, del:0, what:'create_deal, update_deal, search_deals'},
  {id:7, r:0, title:'Upsert + archive actions',    blocks:['act_write'],  add:16, del:2, what:'create_or_update_deal, archive_deal'},
  {id:8, r:0, title:'new_or_updated_deal trigger', blocks:['trigger'],    add:18, del:0, what:'triggers block'},
  {id:9, r:1, title:'Connection test',             blocks:['test'],       add:1,  del:0, what:'test: validates the connection'},
];
let versions=CPS.map(c=>({...c}));   // history entries (can grow on revert)
let head=versions.length-1;          // live version index
let viewing=null, viewBase=null;     // version previewed, and the version to diff it against
let viewLabel='', viewName='';       // estate text + vbar pill while previewing
let hlBlocks=null;                   // which change's blocks to highlight in the full file
let blinkBlocks=null;                // chat-click: blocks to blink within the full diff (no view swap)
// review bar (ported from Problem 3): step through the changes, accept/reject all
const REVIEW_GROUPS=[['conn','conn_token'],['obj_deal','obj_company','obj_contact'],['act_read','act_write'],['trigger'],['test']];
const groupIndex=b=>{ for(let i=0;i<REVIEW_GROUPS.length;i++) if(REVIEW_GROUPS[i].includes(b)) return i; return -1; };
let reviewState='pending';           // pending | accepted | rejected
let reviewCur=0;                     // current change in the redirect stepper
let showHistory=false, diffMode=true;

// the set of code blocks present at a given version index (handles reverted snapshots)
function blockSet(idx){
  if(idx<0) return new Set(['base']);
  const v=versions[idx];
  const upTo = v.snapshotId!==undefined ? v.snapshotId : v.id;
  const s=new Set(['base']);
  CPS.forEach(c=>{ if(c.id<=upTo) c.blocks.forEach(b=>s.add(b)); });
  return s;
}
function codeFor(idx){
  const s=blockSet(idx);
  let html='',ln=1;
  CODE.forEach(l=>{ if(!s.has(l.b)) return; html+=`<div class="cline"><span class="cn">${ln++}</span><span class="cg"></span><span class="ct mono">${l.t.replace(/</g,'&lt;')}</span></div>`; });
  return html;
}
// The editor always shows the whole file. `hl` (a Set of blocks) marks one change to highlight;
// hl=null means "no single change selected", so every line reads as the agent's addition (green).
function fileWithHighlight(hl){
  const s=blockSet(head);
  let html='',ln=1;
  CODE.forEach(l=>{
    if(!s.has(l.b)) return;
    if(l.t.includes('create_or_update_deal')){
      const on = !hl || hl.has('act_write');
      html+=`<div class="cline${on?(hl?' del hl':' del'):''}"><span class="cn"></span><span class="cg">${on?'-':''}</span><span class="ct mono">    delete_deal,</span></div>`;
    }
    const on = !hl || hl.has(l.b);
    html+=`<div class="cline${on?(hl?' add hl':' add'):''}"><span class="cn">${ln++}</span><span class="cg">${on?'+':''}</span><span class="ct mono">${l.t.replace(/</g,'&lt;')}</span></div>`;
  });
  return html;
}
// Full file as a diff (every change keeps its + / - color); `hl` blocks get a blue bar that blinks.
// Used for the chat-click: keep the whole diff visible, just flash the clicked change.
function fileDiffBlink(hl){
  const s=blockSet(head);
  let html='',ln=1;
  CODE.forEach(l=>{
    if(!s.has(l.b)) return;
    if(l.t.includes('create_or_update_deal')){
      const isHl = hl && hl.has('act_write');
      html+=`<div class="cline del${isHl?' hl blink':''}"><span class="cn"></span><span class="cg">-</span><span class="ct mono">    delete_deal,</span></div>`;
    }
    const isHl = hl && hl.has(l.b);
    const gi=groupIndex(l.b);
    html+=`<div class="cline add${isHl?' hl blink':''}"${gi>=0?' data-grp="'+gi+'"':''}><span class="cn">${ln++}</span><span class="cg">+</span><span class="ct mono">${l.t.replace(/</g,'&lt;')}</span></div>`;
  });
  return html;
}
// accepted: the changes are committed, so the file reads as plain code (no diff markers)
function committedFile(){
  const present=blockSet(head); let html='',ln=1;
  CODE.forEach(l=>{ if(!present.has(l.b)) return; html+=`<div class="cline"><span class="cn">${ln++}</span><span class="cg"></span><span class="ct mono">${l.t.replace(/</g,'&lt;')}</span></div>`; });
  return html;
}
// rejected: the agent's changes are dropped, so only the scaffold (base) remains
function baseFile(){
  let html='',ln=1;
  CODE.forEach(l=>{ if(l.b!=='base') return; html+=`<div class="cline"><span class="cn">${ln++}</span><span class="cg"></span><span class="ct mono">${l.t.replace(/</g,'&lt;')}</span></div>`; });
  return html;
}
// Split view: the file Before | After the highlighted change, side by side.
// hl=null compares the scaffold against the whole build.
function splitView(hl){
  const E=t=>t.replace(/</g,'&lt;');
  const after=blockSet(head);
  const before = hl ? new Set([...after].filter(b=>!hl.has(b))) : new Set(['base']);
  const col=(present,isAfter)=>{
    let html='',ln=1;
    CODE.forEach(l=>{
      // delete_deal lived in the BEFORE side; the upsert/archive change replaced it
      if(l.t.includes('create_or_update_deal') && !isAfter && (!hl||hl.has('act_write')) && !before.has('act_write'))
        html+=`<div class="cline del"><span class="cn">${ln++}</span><span class="cg">-</span><span class="ct mono">    delete_deal,</span></div>`;
      if(!present.has(l.b)) return;
      const added = isAfter && !before.has(l.b);
      html+=`<div class="cline${added?' add hl':''}"><span class="cn">${ln++}</span><span class="cg">${added?'+':''}</span><span class="ct mono">${E(l.t)}</span></div>`;
    });
    return html;
  };
  return `<div class="splitwrap"><div class="scol"><div class="scol-h">Before</div><div class="scode">${col(before,false)}</div></div><div class="scol"><div class="scol-h">After</div><div class="scode">${col(after,true)}</div></div></div>`;
}
function renderReviewBar(){
  const rv=$('#rv'); if(!rv) return;
  if(viewing!==null){ rv.innerHTML=''; return; }   // hidden while previewing a checkpoint in history
  if(reviewState!=='pending'){ rv.innerHTML=`<span class="cnt" style="color:#1a7f37">All changes ${reviewState}</span>`; return; }
  const total=REVIEW_GROUPS.length;
  rv.innerHTML=`<i class="ti ti-chevron-up nav" data-rstep="-1"></i><span class="cnt">${reviewCur+1} / ${total}</span><i class="ti ti-chevron-down nav" data-rstep="1"></i><span class="vbar2"></span><span class="b rej" data-rejall><i class="ti ti-x"></i>Reject all</span><span class="b acc" data-accall><i class="ti ti-check"></i>Accept all</span>`;
}
// redirect: scroll the code pane to the current change and flash it
function jumpReview(){
  const c=$('#code'); if(!c) return;
  const lines=c.querySelectorAll('.cline[data-grp="'+reviewCur+'"]'); if(!lines.length) return;
  const first=lines[0], cRect=c.getBoundingClientRect(), eRect=first.getBoundingClientRect();
  c.scrollTop += (eRect.top-cRect.top)-(c.clientHeight/2)+(first.offsetHeight/2);
  lines.forEach(l=>{ l.classList.remove('flash'); void l.offsetWidth; l.classList.add('flash'); setTimeout(()=>l.classList.remove('flash'),1200); });
}
// Scroll only the code pane to center the highlight. Avoid el.scrollIntoView,
// which also scrolls ancestor containers (and the parent page when embedded in an iframe).
function scrollToHl(){
  const c=$('#code'); if(!c) return;
  const el=c.querySelector('.hl'); if(!el) return;
  const cRect=c.getBoundingClientRect(), eRect=el.getBoundingClientRect();
  c.scrollTop += (eRect.top - cRect.top) - (c.clientHeight/2) + (el.offsetHeight/2);
}
// diff of one version against another (baseIdx can be -1 for "nothing yet")
function diffBetween(curIdx, baseIdx){
  const cur=blockSet(curIdx), prev=blockSet(baseIdx);
  let html='',ln=1,adds=0,dels=0;
  CODE.forEach(l=>{
    const inCur=cur.has(l.b), inPrev=prev.has(l.b);
    if(!inCur && !inPrev) return;
    let cls='',g='';
    if(inCur && !inPrev){ cls=' add'; g='+'; adds++; }
    else if(!inCur && inPrev){ cls=' del'; g='-'; dels++; }
    const num = inCur ? (ln++) : '';
    html+=`<div class="cline${cls}"><span class="cn">${num}</span><span class="cg">${g}</span><span class="ct mono">${l.t.replace(/</g,'&lt;')}</span></div>`;
  });
  if(!adds && !dels) html='<div class="empty">No code changes here.</div>';
  return {html,adds,dels};
}
// round + step helpers
const roundTotals=r=>{ let a=0,d=0,n=0; versions.forEach(v=>{ if(v.r===r){a+=v.add;d+=v.del;n++;} }); return {a,d,n}; };
const stepTotals=st=>{ let a=0,d=0; (st.edits||[]).forEach(i=>{a+=CPS[i].add;d+=CPS[i].del;}); return {a,d}; };

function renderCode(){
  if(viewing!==null){
    if(diffMode){
      $('#code').innerHTML=fileWithHighlight(hlBlocks);   // full file, only this change highlighted
      $('#estate').textContent = viewLabel || 'change highlighted';
      scrollToHl();
    } else {
      $('#code').innerHTML=splitView(hlBlocks);           // before | after of this change, side by side
      $('#estate').textContent = viewLabel || '';
    }
  } else if(reviewState==='accepted'){
    $('#code').innerHTML=committedFile(); $('#estate').textContent='changes accepted';
  } else if(reviewState==='rejected'){
    $('#code').innerHTML=baseFile(); $('#estate').textContent='changes rejected';
  } else if(!diffMode){
    $('#code').innerHTML=splitView(null);                 // whole build, before | after
    $('#estate').textContent='';
  } else {
    $('#code').innerHTML=fileDiffBlink(blinkBlocks);      // full diff stays; the clicked change blinks
    $('#estate').textContent = head===versions.length-1?'latest · agent changes':'reverted';
    if(blinkBlocks) scrollToHl();
  }
  $('#vtDiff').classList.toggle('on', diffMode);
  $('#vtFull').classList.toggle('on', !diffMode);
  renderReviewBar();
}
function renderChat(){
  let h='';
  ROUNDS.forEach((rd,ri)=>{
    h+=`<div class="urow"><div class="ubub">${rd.prompt}</div></div>`;
    if(rd.thought) h+=`<div class="thought"><i class="ti ti-brain"></i>${rd.thought}</div>`;
    if(rd.intro) h+=`<div class="say">${rd.intro}</div>`;
    rd.steps.forEach((st,si)=>{
      const click = (st.edits && st.edits.length) ? `data-step="${ri}-${si}"` : '';
      let stat='';
      if(st.file){ const t=stepTotals(st); stat=`<span class="ed"><span class="pos">+${t.a}</span> <span class="neg">-${t.d}</span></span>`; }
      const change = `<span class="chglink" ${click}>${st.title}</span>${stat}`;
      h+=`<div class="say">${st.before ? st.before+' '+change : change}</div>`;
    });
    const t=roundTotals(ri);
    let cpIdx=null; versions.forEach((v,i)=>{ if(v.r===ri) cpIdx=i; });   // last version of this round = the checkpoint
    h+=`<div class="cpsaved" data-cpv="${cpIdx}"><i class="ti ti-clock"></i>Checkpoint saved · ${t.n} edit${t.n>1?'s':''}<i class="ti ti-chevron-right cpchev"></i></div>`;
  });
  $('#chat').innerHTML=h;
}
function renderHistory(){
  let h='', lastR=null;
  for(let i=versions.length-1;i>=0;i--){
    const v=versions[i];
    if(v.r!==lastR){
      lastR=v.r;
      const rd=ROUNDS[v.r];
      const label=rd?rd.title:(v.roundLabel||'Restore');
      const time=rd?rd.time:v.time;
      h+=`<div class="hround"><span class="hr-t">${label}</span><span class="hr-time">${time}</span></div>`;
    }
    const chips=`<span class="chg"><span class="ca">+${v.add}</span><span class="cd">-${v.del}</span></span>`;
    h+=`<div class="hitem${viewing===i?' on':''}${i===head&&viewing===null?' latest':''}" data-v="${i}"><div class="htop"><div class="ht"><span class="dot"></span>${v.title}${i===head?' · latest':''}</div></div><div class="hw">${v.what}${chips}</div></div>`;
  }
  $('#hlist').innerHTML=h;
}
function render(){
  document.body.classList.toggle('viewing', viewing!==null);
  $('#chatView').classList.toggle('hide', showHistory);
  $('#histView').classList.toggle('hide', !showHistory);
  $('#hbtn').classList.toggle('on', showHistory);
  if(viewing!==null) $('#vpill').textContent = viewName || versions[viewing].title;
  renderCode(); renderChat(); if(showHistory) renderHistory();
}
let tt; function toast(m){ const e=$('#toast'); e.textContent=m; e.classList.add('show'); clearTimeout(tt); tt=setTimeout(()=>e.classList.remove('show'),3600); }
function clearView(){ viewing=null; viewBase=null; viewLabel=''; viewName=''; hlBlocks=null; blinkBlocks=null; }
function blocksOf(ids){ const s=new Set(); ids.forEach(i=>CPS[i].blocks.forEach(b=>s.add(b))); if(!s.size) s.add('base'); return s; }

if(NOHIST){ $('#hbtn').classList.add('disabled'); $('#hbtn').title='Checkpoint history is explored separately'; }
$('#hbtn').onclick=()=>{ if(NOHIST) return; showHistory=!showHistory; if(!showHistory) clearView(); render(); };
$('#backLatest').onclick=()=>{ clearView(); render(); };
$('#vtDiff').onclick=()=>{ diffMode=true; renderCode(); };
$('#vtFull').onclick=()=>{ diffMode=false; renderCode(); };
$('#revertBtn').onclick=()=>{
  const v=versions[viewing];
  versions.push({id:versions.length, r:1000+versions.length, roundLabel:'Restore', title:'Reverted to “'+v.title+'”', blocks:[], add:0, del:0, what:'restored '+v.what, time:'now', snapshotId:(v.snapshotId!==undefined?v.snapshotId:v.id)});
  head=versions.length-1; clearView();
  render(); toast('Reverted to “'+v.title+'”. Saved as a new version, nothing was lost.');
};
document.addEventListener('click',e=>{
  const rs=e.target.closest('[data-rstep]'); if(rs){ const total=REVIEW_GROUPS.length; reviewCur=(reviewCur + (+rs.dataset.rstep) + total)%total; renderReviewBar(); jumpReview(); return; }
  if(e.target.closest('[data-accall]')){ reviewState='accepted'; render(); toast('Accepted all changes.'); return; }
  if(e.target.closest('[data-rejall]')){ reviewState='rejected'; render(); toast('Rejected all changes.'); return; }
  const hv=e.target.closest('[data-v]');
  if(hv){ viewing=+hv.dataset.v; const v=versions[viewing]; hlBlocks=blocksOf([viewing]); viewLabel=`+${v.add} -${v.del} · ${v.title}`; viewName=v.title; if(!diffMode) diffMode=true; render(); return; }
  const ss=e.target.closest('[data-step]');
  if(ss){ const [ri,si]=ss.dataset.step.split('-').map(Number); const st=ROUNDS[ri].steps[si]; if(st.edits&&st.edits.length){ blinkBlocks=blocksOf(st.edits); viewing=null; render(); } return; }
  const cp=e.target.closest('[data-cpv]');
  if(cp){ blinkBlocks=null; viewing=+cp.dataset.cpv; const v=versions[viewing]; hlBlocks=blocksOf([viewing]); viewLabel=`+${v.add} -${v.del} · ${v.title}`; viewName=v.title; diffMode=true; showHistory=true; render(); return; }
});

render();
</script>
</body>
</html>
