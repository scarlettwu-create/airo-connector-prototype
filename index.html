<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Research Library</title>
<style>
  :root {
    --bg: #f4f5f7;
    --panel: #ffffff;
    --ink: #1d2330;
    --muted: #6b7280;
    --line: #e4e7ec;
    --accent: #6c5ce7;
    --accent-soft: #efecfd;
    --shadow: 0 1px 3px rgba(16,24,40,.08), 0 1px 2px rgba(16,24,40,.04);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink); background: var(--bg);
    display: flex; height: 100vh; overflow: hidden;
  }
  /* Sidebar */
  aside {
    width: 340px; min-width: 340px; height: 100%;
    background: var(--panel); border-right: 1px solid var(--line);
    display: flex; flex-direction: column;
  }
  .brand { padding: 20px 20px 14px; border-bottom: 1px solid var(--line); cursor: pointer; }
  .brand:hover h1 { color: var(--accent); }
  .brand h1 { font-size: 16px; margin: 0 0 3px; letter-spacing: -.01em; transition: color .12s; }
  .brand .sub { font-size: 12px; color: var(--muted); }
  .search { padding: 12px 16px; border-bottom: 1px solid var(--line); }
  .search input {
    width: 100%; padding: 9px 12px; border: 1px solid var(--line);
    border-radius: 8px; font-size: 13px; outline: none; background: #fbfbfd;
  }
  .search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .list { flex: 1; overflow-y: auto; padding: 8px 10px 24px; }
  .group-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .06em; color: var(--muted);
    padding: 16px 10px 6px;
  }
  .item {
    display: block; width: 100%; text-align: left; cursor: pointer;
    border: 1px solid transparent; background: transparent;
    border-radius: 9px; padding: 10px 12px; margin: 2px 0;
    font: inherit; color: inherit; transition: background .12s, border-color .12s;
  }
  .item:hover { background: #f7f7fb; }
  .item.active { background: var(--accent-soft); border-color: #d9d3fb; }
  .item .t { font-size: 13.5px; font-weight: 600; line-height: 1.35; }
  .item .meta { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
  .badge {
    display: inline-block; font-size: 10px; font-weight: 600;
    padding: 1px 7px; border-radius: 999px; vertical-align: middle;
    background: #eef2ff; color: #4338ca;
  }
  .badge.complaints { background: #fef3f2; color: #b42318; }
  .count { font-size: 11px; color: var(--muted); padding: 4px 12px 0; }
  /* Main */
  main { flex: 1; height: 100%; display: flex; flex-direction: column; min-width: 0; }
  .topbar {
    height: 56px; min-height: 56px; background: var(--panel);
    border-bottom: 1px solid var(--line); display: flex; align-items: center;
    gap: 12px; padding: 0 18px;
  }
  .topbar .doc-title { font-size: 14px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .topbar a.btn {
    font-size: 12.5px; text-decoration: none; color: var(--accent);
    border: 1px solid #d9d3fb; padding: 6px 12px; border-radius: 8px;
    background: var(--panel); white-space: nowrap;
  }
  .topbar a.btn:hover { background: var(--accent-soft); }
  .viewer { flex: 1; position: relative; background: var(--bg); }
  iframe { width: 100%; height: 100%; border: 0; background: #fff; }
  /* Home */
  .home { position: absolute; inset: 0; overflow-y: auto; padding: 32px 36px; }
  .home h2 { font-size: 20px; margin: 0 0 6px; }
  .home p.lead { color: var(--muted); font-size: 13.5px; margin: 0 0 24px; max-width: 640px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 16px 16px 14px; cursor: pointer; box-shadow: var(--shadow);
    transition: transform .12s, box-shadow .12s; display: flex; flex-direction: column;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(16,24,40,.1); }
  .card .t { font-size: 14.5px; font-weight: 700; line-height: 1.35; margin: 8px 0 6px; }
  .card .d { font-size: 12.5px; color: #475467; line-height: 1.5; flex: 1; }
  .card .p { font-size: 11.5px; color: var(--muted); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line); }
  .empty { color: var(--muted); font-size: 13px; padding: 20px 12px; }
</style>
</head>
<body>
  <aside>

      <a class="btn" id="openTab" href="#" target="_blank" rel="noopener" style="display:none">Open in new tab ↗</a>
    </div>
    <div class="viewer">
      <div class="home" id="home"></div>
      <iframe id="frame" title="Document viewer" style="display:none"></iframe>
    </div>
  </main>

const list = document.getElementById('list');
const home = document.getElementById('home');
const frame = document.getElementById('frame');
const docTitle = document.getElementById('docTitle');
const openTab = document.getElementById('openTab');
const goHome = document.getElementById('goHome');
const brandHome = document.getElementById('brandHome');
const revealBtn = document.getElementById('revealBtn');
const qbox = document.getElementById('q');
const resultCount = document.getElementById('resultCount');
const GROUP_ORDER = ["AIRO SDK Editor (PMO-2980)", "Agent control & rollback", "Agent activity & loading", "Agent placement & discoverability", "Multi-agent orchestration", "Other research"];
const BASE_DIR = "/Users/scarlettwu/Documents/GitHub/Claude Code Project";
let currentDoc = null;

function flash(el, msg) {
  const prev = el.dataset.label || el.textContent;
  el.dataset.label = prev;
  el.textContent = msg;
  setTimeout(() => { el.textContent = el.dataset.label; }, 1800);
}

async function revealCurrent() {
  if (!currentDoc) return;
  try {
    const res = await fetch('/reveal?file=' + encodeURIComponent(currentDoc.file));
    if (!res.ok) throw new Error('http ' + res.status);
    const data = await res.json();
    if (!data.ok) throw new Error('not found');
    flash(revealBtn, 'Opened in Finder ✓');
  } catch (e) {
    const abs = BASE_DIR + '/' + currentDoc.file;
    try {
      await navigator.clipboard.writeText(abs);
      flash(revealBtn, 'Path copied · run serve.py to reveal');
    } catch (_) {
      window.prompt('Copy this file path:', abs);
    }
  }
}

function groupBadge(t) {
  return t === 'Customer complaints'
    ? '<span class="badge complaints">Complaints</span>'
    : '<span class="badge">Research</span>';
}

function show(doc) {
  home.style.display = 'none';
  frame.style.display = 'block';
  frame.src = doc.file;
  docTitle.textContent = doc.title;
  openTab.style.display = 'inline-block';
  openTab.href = doc.file;
  goHome.style.display = 'inline-block';
  revealBtn.style.display = 'inline-block';
  currentDoc = doc;
  document.querySelectorAll('.item').forEach(el =>
    el.classList.toggle('active', el.dataset.file === doc.file));
  if (location.hash.slice(1) !== doc.file) history.replaceState(null, '', '#' + doc.file);
}

function showHome() {
  frame.style.display = 'none';
  frame.removeAttribute('src');
  home.style.display = 'block';
  docTitle.textContent = 'All research';
  openTab.style.display = 'none';
  goHome.style.display = 'none';
  revealBtn.style.display = 'none';
  currentDoc = null;
  document.querySelectorAll('.item').forEach(el => el.classList.remove('active'));
  history.replaceState(null, '', location.pathname);
}

function renderHome(docs) {
  const cards = docs.map(d => `
    <div class="card" data-file="${d.file}">
      ${groupBadge(d.type)}
      <div class="t">${d.title}</div>
      <div class="d">${d.description || ''}</div>
      ${d.products ? `<div class="p"><strong>Covers:</strong> ${d.products}</div>` : ''}
    </div>`).join('');
  home.innerHTML = `
    <h2>Competitive UX Research Library</h2>
    <p class="lead">Every research doc in one place. Click any card or use the sidebar to open it here; the search box filters across titles, products, and topics.</p>
    <div class="cards">${cards || '<div class="empty">No documents found.</div>'}</div>`;
  home.querySelectorAll('.card').forEach(c =>
    c.addEventListener('click', () => show(DOCS.find(d => d.file === c.dataset.file))));
}

function renderList(filter) {
  const f = (filter || '').toLowerCase().trim();
  const matched = DOCS.filter(d =>
    !f || (d.title + ' ' + d.description + ' ' + d.products + ' ' + d.group).toLowerCase().includes(f));
  list.innerHTML = '';
  let shown = 0;
  GROUP_ORDER.forEach(group => {
    const inGroup = matched.filter(d => d.group === group);
    if (!inGroup.length) return;
    const label = document.createElement('div');
    label.className = 'group-label';
    label.textContent = group;
    list.appendChild(label);
    inGroup.forEach(d => {
      shown++;
      const btn = document.createElement('button');
      btn.className = 'item';
      btn.dataset.file = d.file;
      btn.innerHTML = `<div class="t">${d.title}</div>
        <div class="meta">${groupBadge(d.type)} ${d.products ? '· ' + d.products.split(',')[0] + '…' : ''}</div>`;
      btn.addEventListener('click', () => show(d));
      list.appendChild(btn);
    });
  });
  resultCount.textContent = f ? `${shown} of ${DOCS.length} match` : '';
  if (!shown) list.innerHTML = '<div class="empty">No matches.</div>';
  renderHome(matched);
}

qbox.addEventListener('input', () => renderList(qbox.value));
goHome.addEventListener('click', e => { e.preventDefault(); showHome(); });
brandHome.addEventListener('click', () => showHome());
revealBtn.addEventListener('click', e => { e.preventDefault(); revealCurrent(); });

renderList('');
const initial = location.hash.slice(1);
const startDoc = initial && DOCS.find(d => d.file === decodeURIComponent(initial));
if (startDoc) show(startDoc); else showHome();
</script>
</body>
