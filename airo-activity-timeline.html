function ckHTML(s){
  const inner = s.state==='done' ? '✓' : s.state==='error' ? '✕' : '';

function railRow(s){

  if (s.state==='error' && s.fail) h += '<div class="fail">'+esc(s.fail)+'</div>';

    h += '<div class="actline" data-act="toggle-task" data-i="'+ti+'"><span class="aico"><i class="ti ti-'+meta.icon+'"></i></span><span class="alabel">'+label+'</span>'+diff+chev+'</div>';
    if (t.open){ h += '<div class="act-body"><div class="rail"><div class="rline"></div>'; visibleOf(t.steps).forEach(s=>h+=railRow(s)); h += '</div></div>'; }
  });
  if (done){
    h += '<div class="say">'+esc(SUMMARIES[EXAMPLE])+'</div>';
    if (!inlineEdits) h += changesHTML();
    h += '<div class="divider"><span class="dl"></span><span class="dtxt">Checkpoint · '+CHECKPOINTS[EXAMPLE]+'</span><span class="dl"></span></div>';
  }
  return h;
}
function changesHTML(){
  const list = CHANGES[EXAMPLE] || [];
  if (!list.length) return '';
  let h = '<div class="changes"><div class="ch-h">Changes · '+list.length+' edit'+(list.length>1?'s':'')+'</div>';
  list.forEach(c=> h += '<div class="ch-row"><i class="ti ti-pencil"></i><span class="ch-f">'+esc(c.file)+'</span><span class="ch-w">'+esc(c.what)+'</span><span class="sp"></span><span class="ch-d"><span class="add">+'+c.add+'</span> <span class="del">-'+c.del+'</span></span></div>');
  h += '</div>';
  return h;
}
function renderProc(){
  if (DETAIL==='combined') return renderNarrated({inlineEdits:true});
  if (DETAIL==='detailed') return renderNarrated();
  if (L.planFirst && planning) return planBox();
  if (done && collapsed) return procHeader();
  return renderTasks();
}
function renderPanelDirection(){
  const title = (EXAMPLE==='simple'?'Added ':'Built ') + CHECKPOINTS[EXAMPLE];
  let left = '<div class="urow"><div class="ubub">'+esc(PROMPTS[EXAMPLE])+'</div></div>';
  left += '<div class="actline"><span class="aico"><i class="ti ti-brain"></i></span><span class="alabel">'+(done?'Thought for 6s':'Thinking…')+'</span></div>';
  if (!done){
    left += '<div class="say">Working on it… <span style="color:var(--accent)">see Details →</span></div>';
  } else {
    left += '<div class="card"><div class="card-top"><span class="card-t">'+esc(title)+'</span><i class="ti ti-bookmark"></i></div>'
      + '<div class="card-btns"><button class="cbtn" data-act="lefttab" data-v="activity">Details</button><button class="cbtn" data-act="lefttab" data-v="code">Code</button></div></div>';
  }
  let footer = ''; const w = allSteps().find(s=>s.state==='waiting');
  if (w) footer = '<div class="approvebar"><span class="ab-t">'+esc(w.gate||'Approve this step?')+'</span><span class="sp"></span><button class="cbtn ok" data-act="approve">Approve</button><button class="cbtn" data-act="approve">Skip</button></div>';
  return chatShell(left, footer);
}
function definitionHTML(){
  return `
  <h1 class="d-title">Stream of thoughts &amp; activities</h1>

  <h2 class="d-h2">1. The real problem and the goal</h2>
  <p>When AIRO edits a connector, the user has to be able to follow what it is doing to their code. Today the panel just says "AIRO is thinking." That is the starting point we are replacing, and the reason this is worth defining carefully rather than copying a coding tool's stream wholesale.</p>
  <h3 class="d-h3">The real problem</h3>
  <p>A connector developer watching AIRO work needs to answer two questions, continuously, and the current UI answers neither:</p>
  <ul class="d-ul">
    <li><strong>"What is it doing to my code right now?"</strong> A blank "thinking" spinner gives no content. The opposite move, dumping the full reasoning and tool stream inline the way Claude Code does by default, over-answers it and buries the signal in noise (filed as "significant visual noise" with no way to collapse, <a href="https://github.com/anthropics/claude-code/issues/52640" target="_blank" rel="noopener">Claude Code #52640</a>).</li>
    <li><strong>"Is this going the right way, or do I stop it?"</strong> The one that actually matters, and the hardest. By the time a wrong edit has finished landing in a 1,000-line connector, the cheap moment to intervene has passed.</li>
  </ul>

  <div class="d-callout">
    <h4>The goal</h4>
    <p style="margin:0 0 6px">An activity summary that is:</p>
    <ul>
      <li><strong>Glanceable.</strong> One line of intent per step, in plain language, so the user understands what is happening without reading a transcript.</li>
      <li><strong>Interruptible at the cheapest moment.</strong> The user can stop mid-step the instant a wrong direction shows, not only after the edit lands.</li>
      <li><strong>Trustworthy enough to look away.</strong> The summary and the resulting diff are good enough to review afterward, so the user does not have to babysit the stream.</li>
    </ul>
    <p style="margin:0">In one line: the activity summary is a <strong>control surface, not a log</strong>. That reframe (from the research's "biggest gap" finding) shapes the panel more than the visual layout does.</p>
  </div>

  <h2 class="d-h2">2. Principles we want to follow</h2>
  <p>Six principles, each grounded in how other tools got it right or wrong. The Options toggles in Exploration turn principles 1 through 4 on and off.</p>

  <div class="principle"><div class="ptitle"><span class="n">1.</span>Say what it's about to do, in one line.</div>
    <div class="pdesc">As each edit lands, show one plain line of intent — "Editing connection auth", "Adding get_user action". That line is what lets the user catch a wrong turn early.</div>
    <div class="src">Pattern: <a href="https://www.shapeof.ai/patterns/stream-of-thought" target="_blank" rel="noopener">Shape of AI, Stream of Thought</a>; <a href="https://docs.cursor.com/agent/planning" target="_blank" rel="noopener">Cursor Plan Mode</a>.</div></div>

  <div class="principle"><div class="ptitle"><span class="n">2.</span>One density by default; let users go deeper or quieter.</div>
    <div class="pdesc">Show one line per action and collapse the reasoning. Let users expand a step for detail, or turn the whole thing down. Ship the collapse on day one, not as a retrofit.</div>
    <div class="src">Claude Code's no-toggle inline thinking was filed as noise (<a href="https://github.com/anthropics/claude-code/issues/52640" target="_blank" rel="noopener">#52640</a>); Cursor later added a compact / detailed control (<a href="https://cursor.com/changelog/2-0" target="_blank" rel="noopener">Cursor 2.0</a>).</div></div>

  <div class="principle"><div class="ptitle"><span class="n">3.</span>Build the summary from the diff, not the model's word.</div>
    <div class="pdesc">Generate each summary line from the real diff (which block changed, lines added and removed) and let the model only phrase it. A summary that can't disagree with the editor is the whole point.</div>
    <div class="src"><a href="airo-sdk-editor-diff-lifecycle-competitive-research.html" target="_blank" rel="noopener">Diff lifecycle research</a>: users caught agents claiming changes that never happened. <a href="https://arxiv.org/abs/2510.04494" target="_blank" rel="noopener">NaturalEdit</a>: summaries help most when they link to the code.</div></div>

  <div class="principle"><div class="ptitle"><span class="n">4.</span>Always stoppable mid-step, with a heartbeat.</div>
    <div class="pdesc">A stop that halts right away, plus a live "doing X now" line so silence never looks frozen. A stream you can't cancel mid-step is just a slow log.</div>
    <div class="src">Claude Code users asked to cancel early on buffered output (<a href="https://github.com/anthropics/claude-code/issues/14280" target="_blank" rel="noopener">#14280</a>).</div></div>

  <div class="principle"><div class="ptitle"><span class="n">5.</span>Earn the right to look away.</div>
    <div class="pdesc">A clean per-turn summary plus a reviewable diff let the user step away and come back, instead of watching every token.</div>
    <div class="src"><a href="https://microsoft.design/articles/ux-design-for-agents/" target="_blank" rel="noopener">Microsoft, UX Design for Agents</a>; past 10s of wait, show real progress and an interrupt (<a href="https://www.nngroup.com/articles/response-times-3-important-limits/" target="_blank" rel="noopener">NN/g</a>).</div></div>

  <div class="principle"><div class="ptitle"><span class="n">6.</span>Narrate the process; the editor shows the code.</div>
    <div class="pdesc">The summary covers the steps, tools, and status. The editor owns the code and the diff — don't render the connector twice.</div>
    <div class="src">Carried over from the AIRO working-view principle: the "agent working" view shows the process, not the blueprint.</div></div>
  `;
}
function prosConsHTML(){
  const d = PROSCONS[DETAIL]; if (!d) return '';
  const l = (DETAILS.find(([v])=>v===DETAIL) || [,''])[1];
  let h = '<div class="pgrp pc-grp"><div class="pl">Pros &amp; cons</div>';
  h += '<div class="pc on">';
  h += '<div class="pc-h"><span class="pc-name">'+esc(l)+'</span></div>';
  h += '<div class="pc-sub">'+esc(d.alt)+'</div>';
  h += '<ul class="pc-pro">'+d.pros.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul>';
  h += '<ul class="pc-con">'+d.cons.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul>';
  h += '</div>';
  return h+'</div>';
}
function trackerStrip(){
  const list = tasks.length ? tasks : taskDefs().map(t=>({...t, state:'queued'}));
  const total = list.length;
  const runIdx = list.findIndex(t=>t.state==='run');
  let title;
  if (done) title = 'All '+total+' tasks complete';
  else if (runIdx>=0) title = 'Task '+(runIdx+1)+' of '+total+' in progress';
  else title = total+' tasks planned';
  let h = '<div class="chat-tracker"><div class="ct-head" data-act="toggle-tracker"><i class="ti ti-list-check"></i><span class="tracker-title">'+title+'</span><span class="ct-chev">'+(trackerOpen?'⌄':'›')+'</span></div>';
  if (trackerOpen){
    h += '<div class="tracker-list">';
    list.forEach(t=>{
      const st = t.state || 'queued';
      const dot = st==='done' ? '✓' : '';
      h += '<div class="trow"><span class="tdot '+st+'">'+dot+'</span><span class="tlabel '+(st==='done'?'done':'')+'">'+esc(t.plan||t.summary||t.active)+'</span></div>';
    });
    h += '</div>';
  }
  return h+'</div>';
}
function composer(){
  return '<div class="composer"><div class="composer-box"><span class="composer-ph">Ask anything…</span><span class="composer-send"><i class="ti ti-arrow-up"></i></span></div></div>';
}
function activityList(){
  let sb = '<div class="actline"><span class="aico"><i class="ti ti-brain"></i></span><span class="alabel">'+(done?'Thought for 6s':'Thinking…')+'</span></div>';
  tasks.forEach(t=>{
    if (t.state==='queued') return;
    const running = t.state==='run';
    const meta = NARR[t.id] || {icon:'point'};
    const label = running ? esc(t.active)+'…' : esc(meta.act||t.summary);
    const d = DIFF[t.id];
    let h = '<div class="tl-row"><i class="ti ti-'+(d?'file-pencil':meta.icon)+'"></i><span class="tl-act">'+label+'</span>';
    if (d){
      h += '<span class="tl-f">connector.rb</span>';
      if (t.state==='done') h += '<span class="ch-d"><span class="add">+'+d.add+'</span> <span class="del">-'+d.del+'</span></span>';
    }
    sb += h+'</div>';
  });
  if (done) sb += '<div class="side-sum">'+esc(SUMMARIES[EXAMPLE])+'</div>';
  return sb;
}
function codeWindow(){
  // The Details tab only exists for the "Summary + activity panel" (compact) option.
  const hasDetails = DETAIL==='compact';
  const lt = hasDetails ? leftTab : 'code';
  let h = '<div class="code-window"><div class="code-head">'
    + '<span class="ltab '+(lt==='code'?'on':'')+'" data-act="lefttab" data-v="code"><i class="ti ti-file-code"></i> connector.rb</span>'
    + (hasDetails ? '<span class="ltab '+(lt==='activity'?'on':'')+'" data-act="lefttab" data-v="activity"><i class="ti ti-list-details"></i> Details</span>' : '')
    + '<span class="sp"></span>'+(lt==='code'?'<span class="code-meta">Ruby</span>':'')+'</div>';
  if (lt==='activity'){
    h += '<div class="side-body">'+activityList()+'</div>';
  } else {
    h += '<div class="code-body">';
    CODE.forEach((l,i)=> h += '<div class="code-line"><span class="ln">'+(i+1)+'</span><span class="lc">'+esc(l)+'</span></div>');
    h += '</div>';
  }
  return h+'</div>';
}
function phead(){
  return '<div class="phead"><div class="mark"><span class="badge">&raquo;</span><span class="mname">AIRO</span></div><span class="sp"></span><button class="rbtn '+(finalView?'on':'')+'" data-act="finalview">Final view</button><button class="rbtn" data-act="replay">Replay</button></div>';
}
function chatShell(body, footer, extra){
  return '<div class="panel">'+phead()+'<div class="msgs">'+body+'</div>'+(footer||'')+(extra||'')+composer()+'</div>';
}
function renderTracker(){
  // Lean conversation: just working, then one final summary. All the step detail lives in the tracker below.
  let body = '<div class="urow"><div class="ubub">'+esc(PROMPTS[EXAMPLE])+'</div></div>';
  body += '<div class="actline"><span class="aico"><i class="ti ti-brain"></i></span><span class="alabel">'+(done?'Thought for 6s':'Thinking…')+'</span></div>';
  if (done){
    body += '<div class="say">'+esc(SUMMARIES[EXAMPLE])+'</div>';
    body += '<div class="divider"><span class="dl"></span><span class="dtxt">Checkpoint · '+CHECKPOINTS[EXAMPLE]+'</span><span class="dl"></span></div>';
  } else {
    body += '<div class="say">Working on it… <span style="color:var(--accent)">follow the plan below ↓</span></div>';
  }
  let footer = '';
  const w = allSteps().find(s=>s.state==='waiting');
  if (w) footer = '<div class="approvebar"><span class="ab-t">'+esc(w.gate||'Approve this step?')+'</span><span class="sp"></span><button class="cbtn ok" data-act="approve">Approve</button><button class="cbtn" data-act="approve">Skip</button></div>';
  return chatShell(body, footer, trackerStrip());
}
function render(){
  let p = '<div class="defcard'+(view==='definition'?' on':'')+'" data-act="showdef"><i class="ti ti-book-2"></i><span class="defcard-t">Problem definition &amp; design principles</span><i class="ti ti-arrow-right defcard-arrow"></i></div>';
  p += '<div class="rail-title">Make it digestible &amp; controllable</div>';
  p += '<p class="rail-sub">Five ways AIRO can surface the live activity, not just display it. Pick one to preview and see its trade-offs.</p>';
  p += '<div class="opts">';
  DETAILS.forEach(([v,l],i)=>{
    const d = PROSCONS[v] || {};
    const on = view!=='definition' && DETAIL===v;
    const rec = (v==='thoughts' || v==='compact');
    const badge = rec ? '<span class="oc-badge rec">Recommended</span>' : (d.badge ? '<span class="oc-badge '+d.tone+'">'+esc(d.badge)+'</span>' : '');
    p += '<div class="optcard'+(on?' on':'')+(rec?' rec':'')+'" data-act="detail" data-v="'+v+'">';
    p += '<div class="oc-top"><span class="oc-num">'+(i+1)+'</span><span class="oc-name">'+esc(l)+'</span>'+badge+'</div>';
    if (d.alt) p += '<div class="oc-desc">'+esc(d.alt)+'</div>';
    if (on && d.pros){
      p += '<div class="oc-pc"><div class="oc-col oc-pros"><div class="oc-ph">Pros</div><ul>'+d.pros.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul></div>'
         + '<div class="oc-col oc-cons"><div class="oc-ph">Cons</div><ul>'+d.cons.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul></div></div>';
    }
    p += '</div>';
  });
  p += '</div>';

  let chat;
  if (DETAIL==='compact'){
    chat = renderPanelDirection();
  } else if (DETAIL==='tracker'){
    chat = renderTracker();
  } else {
    let body = '<div class="urow"><div class="ubub">'+esc(PROMPTS[EXAMPLE])+'</div></div>';
    body += '<div class="proc">'+renderProc()+'</div>';
    if (done && DETAIL==='thoughts'){
      body += '<div class="who">Message</div><div class="bub">'+esc(SUMMARIES[EXAMPLE])+'</div>';
      const nc = (CHANGES[EXAMPLE]||[]).length;
      body += '<button class="viewchg'+(changesOpen?' open':'')+'" data-act="toggle-changes"><i class="ti ti-git-compare" style="font-size:14px;"></i>View '+nc+' change'+(nc>1?'s':'')+'</button>';
      if (changesOpen) body += changesHTML();
      body += '<div class="divider"><span class="dl"></span><span class="dtxt">Checkpoint · '+CHECKPOINTS[EXAMPLE]+'</span><span class="dl"></span></div>';
    }
    let footer = '';
    const w = allSteps().find(s=>s.state==='waiting');
    if (w) footer = '<div class="approvebar"><span class="ab-t">'+esc(w.gate||'Approve this step?')+'</span><span class="sp"></span><button class="cbtn ok" data-act="approve">Approve</button><button class="cbtn" data-act="approve">Skip</button></div>';
    chat = chatShell(body, footer);
  }
  const stage = (view==='definition')
    ? '<div class="docpanel"><div class="defwrap">'+definitionHTML()+'</div></div>'
    : '<div class="frame"><div class="editor">'+codeWindow()+chat+'</div></div>';

  document.getElementById('app').innerHTML = EMBED
    ? '<div class="stage embed">'+stage+'</div>'
    : '<div class="wrap"><div class="params">'+p+'</div><div class="stage">'+stage+'</div></div>';
}

function replay(force){
  done = false; collapsed = false; secs = 0; gateResolve = null; sideTab = 'timeline'; preview = false; changesOpen = false;
  if (finalView && !force){ showFinal(); return; }
  if (L.planFirst && DETAIL==='thoughts'){ planItems = SOURCE().map(t=>({id:t.id, label:t.plan, gate:t.planGate})); tasks = []; planning = true; render(); }
  else { planning = false; execute(); }
}
function showFinal(){
  ++gen; // cancel any running animation
  planning = false;
  tasks = taskDefs().map(t=>({...t, state:'done', open:false, steps:t.steps.map(s=>({...mapStep(s), state:'done'}))}));
  const total = tasks.flatMap(t=>t.steps).reduce((a,s)=>a+(s.dur||0),0);
  secs = Math.max(1, Math.round(total/1000));
  done = true; collapsed = true;
  render();
}
async function execute(){
  const my = ++gen;
  tasks = taskDefs().map(t=>({...t, state:'queued', open:false, steps:t.steps.map(mapStep)}));
  render();
  const t0 = Date.now();
  for (let ti=0; ti<tasks.length; ti++){
    if (my!==gen) return;
    const task = tasks[ti];
    task.state='run'; task.open=true; render();
    for (let si=0; si<task.steps.length; si++){
      if (my!==gen) return;
      const step = task.steps[si];
      step.state='run'; render();
      await sleep(step.dur); if (my!==gen) return;
      if (L.gate && step.approval){ step.state='waiting'; render(); await new Promise(r=>gateResolve=r); if (my!==gen) return; }
      if (step.err){ step.state='error'; render(); await sleep(800); if (my!==gen) return; step.state='retry'; render(); await sleep(1000); if (my!==gen) return; }
      step.state='done'; render();
    }
    task.state='done'; task.open=false; render();
  }
  secs = Math.max(1, Math.round((Date.now()-t0)/1000));
  done = true; collapsed = true; render();
}

document.getElementById('app').addEventListener('click', (e)=>{
  const a = e.target.closest('[data-act]'); if (!a) return;
  const act = a.dataset.act;
  if (act==='showdef'){ view = 'definition'; render(); }
  else if (act==='toggle-changes'){ changesOpen = !changesOpen; render(); }
  else if (act==='detail'){ DETAIL = a.dataset.v; view = 'prototype'; leftTab = (DETAIL==='compact'?'activity':'code'); replay(); }
  else if (act==='lefttab'){ leftTab = a.dataset.v; render(); }
  else if (act==='finalview'){ finalView = !finalView; replay(); }
  else if (act==='toggle-tracker'){ trackerOpen = !trackerOpen; render(); }
  else if (act==='layer'){ const k=a.dataset.v; L[k]=!L[k]; (k==='reasoning'||k==='evidence') ? render() : replay(); }
  else if (act==='replay'){ replay(true); }
  else if (act==='run-plan'){ planning=false; execute(); }
  else if (act==='approve'){ if (gateResolve){ gateResolve(); gateResolve=null; } }
  else if (act==='remove'){ planItems.splice(+a.dataset.i,1); render(); }
  else if (act==='toggle-task'){ const t=tasks[+a.dataset.i]; if (t && t.state==='done'){ t.open=!t.open; render(); } }
  else if (act==='collapse'){ if (done){ collapsed=!collapsed; render(); } }
  else if (act==='sidetab'){ sideTab=a.dataset.v; preview=false; render(); }
  else if (act==='preview'){ preview=true; render(); }
  else if (act==='details'){ preview=false; render(); }
});

replay();
</script>
